async function loadFmpBatch(syms){
 const supported=syms.filter(isFmpSupported);
 const unsupported=syms.filter(s=>!isFmpSupported(s));
 unsupported.forEach(s=>setErr(s,"FMP rapide ne gère pas ce symbole. Utilise l'analyse détaillée/TradingView."));
 if(!supported.length)return [];
 const chunks=[];
 for(let i=0;i<supported.length;i+=10)chunks.push(supported.slice(i,i+10));
 const out=[];
 for(const ch of chunks){
   const data=await fmpFetch(`/api/v3/quote/${encodeURIComponent(ch.join(','))}`);
   (Array.isArray(data)?data:[]).forEach(x=>{const q=normalizeFmpQuote(x);if(q.close){setC("quote",q.symbol,q);clearErr(q.symbol);out.push(q)}});
 }
 return out;
}

function tradingLevels(t){

 let preferred="Attendre";

 if(t.sig==="Zone achat") {preferred="Rebond support"; decision="Achat progressif possible";}
 else if(t.sig==="Surveiller achat") {preferred="Repli propre"; decision="Surveiller achat, pas achat immédiat";}
 else if(t.sig==="Breakout") {preferred="Cassure"; decision="Achat momentum sous condition"; stop=(res||c)-atr*0.65; target1=c+atr*1.4; target2=c+atr*2.4;}
 else if(t.sig==="Day trade possible") {preferred="Day trade"; decision="Trade court terme possible"; stop=c-atr*0.65; target1=c+atr*0.9; target2=c+atr*1.45;}
 else if(t.sig==="Prendre profit") {preferred="Pas d’entrée"; decision="Éviter achat / sécuriser gains"; stop=c-atr*0.9; target1=res||c+atr*0.8; target2=c+atr*1.5;}

function tradePlan(t){if(!t.c)return"Plan indisponible.";const p=tradingLevels(t);return `${p.decision}. Entrée idéale: ${rangeFmt(p.pullLow,p.pullHigh)}. Cassure: ${rangeFmt(p.momLow,p.momHigh)}. Stop: ${fmt(p.stop)}. Objectifs: ${fmt(p.target1)} puis ${fmt(p.target2)}. Conviction: ${p.conv}/10.`}
function makeAdvice(sig){if(sig==="Prendre profit")return"Titre tendu : sécuriser gains ou stop relevé.";if(sig==="Zone achat")return"Zone intéressante mais entrée progressive uniquement.";if(sig==="Breakout")return"Cassure potentielle : confirmer avec volume.";if(sig==="Surveiller achat")return"Setup correct : surveiller repli ou cassure.";if(sig==="Day trade possible")return"Intraday intéressant : stop serré obligatoire.";return"Pas de signal fort : attendre confirmation."}
function rankLoaded(){return watchlist.map(w=>({w,t:technical(w.symbol),err:getErr(w.symbol)})).filter(x=>x.t).sort((a,b)=>(b.t.score+b.t.dayScore)-(a.t.score+a.t.dayScore))}function allErrors(){return watchlist.map(w=>({w,err:getErr(w.symbol)})).filter(x=>x.err)}

function timeframeScoreFromArr(arr){
 if(!arr||arr.length<30)return null;
 const c=arr.at(-1).close, s20=SMA(arr,20), s50=SMA(arr,50), r=RSI(arr,14), m=MACD(arr);
 let score=50;
 if(s20&&c>s20)score+=12; else score-=8;
 if(s50&&c>s50)score+=10; else score-=6;
 if(s20&&s50&&s20>s50)score+=8;
 if(r!==null){ if(r>55&&r<70)score+=8; if(r<35)score+=6; if(r>75)score-=12; }
 if(m&&m>0)score+=6;
 return Math.max(0,Math.min(100,Math.round(score)));
}
function multiTF(sym){
 const d=values(getC("daily",sym)?.data), h=values(getC("hourly",sym)?.data), m5=values(getC("intra",sym)?.data);
 const sd=timeframeScoreFromArr(d), sh=timeframeScoreFromArr(h), sm=timeframeScoreFromArr(m5);
 const arr=[sd,sh,sm].filter(x=>x!==null);
 const avg=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
 let label="Incomplet";
 if(avg!==null){ if(sd>60&&sh>60&&sm>60)label="Alignement haussier"; else if(sd<45&&sh<45&&sm<45)label="Alignement baissier"; else if(sd>60&&sh<50)label="Daily positif mais intraday faible"; else if(sd<50&&sm>60)label="Rebond court terme contre tendance"; else label="Mixte"; }
 return {daily:sd,hourly:sh,m5:sm,avg,label};
}
function detectSetups(sym,t){
 const setups=[];
 const mt=multiTF(sym);
 if(t.sig==="Breakout")setups.push("Breakout");
 if(t.sig==="Day trade possible")setups.push("Day trade");
 if(t.distSup!==null&&t.distSup<3)setups.push("Proche support");
 if(t.distRes!==null&&t.distRes<3)setups.push("Proche résistance");
 if(t.rsi&&t.rsi<35)setups.push("Survente daily");
 if(t.rsi&&t.rsi>70)setups.push("Surachat daily");
 if(t.rsi5&&t.rsi5<35)setups.push("Rebond intraday");
 if(t.vol&&t.vol.includes("fort"))setups.push("Volume fort");
 if(mt.label==="Alignement haussier")setups.push("Multi-timeframe haussier");
 if(mt.label==="Daily positif mais intraday faible")setups.push("Pullback potentiel");
 return setups.length?setups:["Aucun setup fort"];
}
function opportunityScore(x){
 const t=x.t, mt=multiTF(x.w.symbol);
 let s=t.score*0.45+t.dayScore*0.35+(mt.avg||50)*0.20;
 if(["Breakout","Zone achat","Day trade possible"].includes(t.sig))s+=8;
 if(t.sig==="Prendre profit")s-=10;
 return Math.round(Math.max(0,Math.min(100,s)));
}


function probabilityLabel(score){
 if(score>=80)return["Très forte","green"];
 if(score>=70)return["Forte","green"];
 if(score>=60)return["Correcte","amber"];
 if(score>=50)return["Moyenne","amber"];
 return["Faible","red"];
}
function nextAction(sym,t){
 const mt=multiTF(sym);
 if(t.sig==="Prendre profit")return"Éviter nouvel achat. Sécuriser ou attendre un repli.";
 if(t.sig==="Breakout")return"Entrer uniquement si la cassure tient avec volume. Stop sous la zone cassée.";
 if(t.sig==="Zone achat")return"Entrée progressive possible proche support, stop obligatoire.";
 if(t.sig==="Day trade possible")return"Possible trade court terme. Objectif rapide, stop serré.";
 if(t.sig==="Surveiller achat")return"Mettre en surveillance. Acheter seulement sur repli propre ou cassure confirmée.";
 if(mt.label==="Daily positif mais intraday faible")return"Attendre fin de pullback : intéressant seulement si le 5 min/1h se retourne.";
 if(mt.label==="Rebond court terme contre tendance")return"Rebond possible mais fragile. Trade court uniquement.";
 return"Attendre. Pas d’avantage clair.";
}
function setupQuality(sym,t){
 const mt=multiTF(sym), setups=detectSetups(sym,t);
 let p=opportunityScore({w:{symbol:sym},t});
 if(t.risk&&t.risk[0]==="Élevé")p-=8;
 p=Math.max(0,Math.min(100,Math.round(p)));
 return {prob:p,label:probabilityLabel(p),mt,setups,action:nextAction(sym,t)};
}
function marketRegime(){
 const spy=technical("SPY"), qqq=technical("QQQ");
 if(!spy&&!qqq)return"Charge SPY et QQQ pour obtenir le régime marché.";
 const a=[];
 if(spy)a.push(`SPY ${spy.day>=0?"positif":"négatif"} (${pct(spy.day)})`);
 if(qqq)a.push(`QQQ ${qqq.day>=0?"positif":"négatif"} (${pct(qqq.day)})`);
 let risk="Neutre";
 if(spy&&qqq&&spy.day>0&&qqq.day>0)risk="Risk-on : marché porteur.";
 if(spy&&qqq&&spy.day<0&&qqq.day<0)risk="Risk-off : prudence sur achats agressifs.";
 return risk+" "+a.join(" · ");
}

function filteredList(l){if(currentFilter==="buy")return l.filter(x=>["Zone achat","Surveiller achat","Breakout","Day trade possible"].includes(x.t.sig));if(currentFilter==="sell")return l.filter(x=>x.t.sig==="Prendre profit");if(currentFilter==="day")return l.filter(x=>x.t.dayScore>=60||x.t.sig==="Day trade possible");if(currentFilter==="strong")return l.filter(x=>x.t.score>=70);return l}

function isInUserWatchlist(sym){return watchlist.some(w=>w.symbol===sym)}
function marketUniverseItems(){return MARKET_UNIVERSE.map(sym=>({w:{symbol:sym,label:MARKET_LABELS[sym]||sym,sector:marketSector(sym)},t:technical(sym),already:isInUserWatchlist(sym)})).filter(x=>x.t)}
function marketSector(sym){if(["NVDA","AMD","AVGO","QCOM","MRVL","MU","SMCI","ARM","TSM","ASML","AMAT","LRCX","INTC","TXN","ON","MCHP","ADI","KLAC","MPWR","TER","NXPI","SWKS","WDC","STX","DELL","HPE","ANET","CIEN"].includes(sym))return"Semi / IA";if(["MSFT","AAPL","GOOGL","META","AMZN","NFLX","PLTR","SNOW","CRM","NOW","ADBE","ORCL","IBM","PANW","CRWD","ZS","FTNT","DDOG","MDB","NET","TEAM","HUBS","WDAY","OKTA","ESTC","PATH","AI","APP","SHOP"].includes(sym))return"Tech / Software";if(["SPY","QQQ","IWM","DIA","TLT","GLD","SLV"].includes(sym))return"Baromètre marché";if(["LLY","NVO","UNH","PFE","MRNA","ISRG","TMO","VEEV","HIMS","DXCM","ABT","JNJ","REGN","VRTX"].includes(sym))return"Santé";if(["RACE","STLA","F","GM","TSLA","RIVN","LCID","LI","NIO","TM"].includes(sym))return"Auto";if(["COIN","HOOD","SQ","PYPL","SOFI","AFRM","V","MA","JPM","BAC","GS","MS","C","AXP","BLK"].includes(sym))return"Finance / Fintech";if(["COST","WMT","TGT","HD","LOW","SBUX","MCD","CMG","CAVA","CELH","NKE","LULU","MELI","SE","DASH","ABNB","UBER"].includes(sym))return"Conso / Croissance";if(["XOM","CVX","OXY","COP","SLB","ENPH","FSLR","NEE","VST","CCJ","CEG"].includes(sym))return"Énergie";return"Marché"}
function agentCapital(){return num(localStorage.getItem("agentCapital_v18"))||10000}
function agentRiskPct(){return num(localStorage.getItem("agentRiskPct_v18"))||1}
function saveAgentParams(){const c=num(document.getElementById("agentCapital")?.value),r=num(document.getElementById("agentRiskPct")?.value);if(c)localStorage.setItem("agentCapital_v18",String(c));if(r)localStorage.setItem("agentRiskPct_v18",String(r));renderAll()}
function marketScore(x){const t=x.t;const p=tradingLevels(t);let s=t.score*0.36+t.dayScore*0.26+p.conv*5; if(Math.abs(t.day)>3)s+=7;if(t.day>0)s+=4;if(t.day<-4)s-=3;if(t.quick)s+=2;if(t.extended&&Math.abs(t.extended.pct)>3)s+=8;if(t.sig==="Prendre profit")s-=18;if(t.sig==="Zone achat")s+=12;if(t.sig==="Breakout")s+=10;if(t.sig==="Surveiller achat")s+=6;if(t.risk&&t.risk[0]==="Élevé")s-=8;const rr=isFinite(p.rr1)?p.rr1:0;if(rr>1.5)s+=6;if(rr<0.8)s-=7;return Math.max(0,Math.min(100,Math.round(s)))}
function topMarketIdeas(n=10,{preferNew=true}={}){const base=marketUniverseItems().filter(x=>!["SPY","QQQ","IWM","DIA","TLT","GLD","SLV"].includes(x.w.symbol)).map(x=>({...x,mScore:marketScore(x)})).sort((a,b)=>b.mScore-a.mScore);if(!preferNew)return base.slice(0,n);const fresh=base.filter(x=>!x.already);const picked=[...fresh.slice(0,n)];if(picked.length<n){base.forEach(x=>{if(picked.length<n&&!picked.some(y=>y.w.symbol===x.w.symbol))picked.push(x)})}return picked.slice(0,n)}
function marketDiagnosticsHTML(){
 const loaded=marketLoadedItems(), fresh=loaded.filter(x=>!x.already), known=loaded.filter(x=>x.already);
 const sample=fresh.slice(0,12).map(x=>x.w.symbol).join(', ');
 let diag={};try{diag=JSON.parse(localStorage.getItem('marketDiag_v18_3')||'{}')}catch(e){}
 const errs=allErrors().filter(x=>MARKET_UNIVERSE.includes(x.w.symbol)).slice(0,8);
 return `<div class="note">Diagnostic V18.3 : univers total <b>${MARKET_UNIVERSE.length}</b> · chargées <b>${loaded.length}</b> · hors watchlist <b>${fresh.length}</b> · déjà suivies <b>${known.length}</b>${diag.last?`<br>Dernier scan : reçues <b>${diag.ok||0}</b> / ${diag.total||MARKET_UNIVERSE.length} · erreurs <b>${diag.err||0}</b> · ${diag.time||''}`:''}${sample?`<br>Nouvelles valeurs détectées : ${sample}`:''}${errs.length?`<br><span class="warn">Exemples erreurs : ${errs.map(x=>x.w.symbol+': '+x.err.msg).join(' | ')}</span>`:''}</div>`;
}
function categoryCards(title,arr,empty='Aucune opportunité claire dans cette catégorie.'){
 return `<div class="card"><b>${title}</b><div class="tradeCards">${arr.length?arr.map((x,i)=>tradeCardHTML(x,i)).join(''):`<div class="note">${empty}</div>`}</div></div>`;
}
function marketAgentsHTML(){
 const loaded=marketLoadedItems();
 const ready=marketScanReady||loaded.length>10;
 const regime=marketRegimeAgent();
 const ideas=topMarketIdeas(10,{preferNew:true});
 const best=ideas[0];
 const semi=marketBySector(['semi','ia'],6);
 const software=marketBySector(['software','tech'],6);
 const growth=marketBySector(['croissance','conso','finance'],6);
 const day=topMarketIdeas(80,{preferNew:false}).filter(x=>x.t.dayScore>=60).slice(0,6);
 const swing=topMarketIdeas(80,{preferNew:false}).filter(x=>x.t.score>=65).slice(0,6);
 return `<div class="card ai"><b>Agent opportunités marché V18.3</b>
 <div class="note">Cette version scanne un <b>univers indépendant de ta watchlist</b>. Le Top 10 doit donc faire apparaître aussi des actions que tu ne suis pas encore.</div>
 <div class="toolbar"><button class="primary" onclick="scanMarketUniverse()">Scanner marché V18.3</button><button class="secondary" onclick="addTopMarketToWatchlist()">Ajouter Top 10</button></div>
 <div class="agentInputs"><input id="agentCapital" placeholder="Capital ex: 10000" value="${agentCapital()}"><input id="agentRiskPct" placeholder="Risque % ex: 1" value="${agentRiskPct()}"></div><button class="secondary" onclick="saveAgentParams()">Sauver capital / risque</button>
 ${scanState.active?`<div class="scanProgress"><div><b>${scanState.label}</b> ${scanState.done}/${scanState.total}</div><div class="bar"><span style="width:${scanState.total?Math.round(scanState.done/scanState.total*100):0}%"></span></div></div>`:''}
 ${ready?`<div class="regimeBox"><div class="regimeItem"><b>Régime</b><span>${regime.score}/100</span></div><div class="regimeItem"><b>Mode</b><span>${regime.score>=70?'Agressif':regime.score>=50?'Sélectif':'Défensif'}</span></div><div class="regimeItem"><b>Univers chargé</b><span>${loaded.length}</span></div></div>
 <div class="note"><b>Conclusion marché :</b> ${regime.mode}</div>${marketDiagnosticsHTML()}
 ${best?`<div class="agentBest"><b>Si c’était mon argent aujourd’hui</b><div class="note">Je regarderais d’abord <b>${best.w.symbol}</b> (${best.w.sector}). Entrée ${rangeFmt(agentTradeDecision(best).p.pullLow,agentTradeDecision(best).p.pullHigh)}, stop ${fmt(agentTradeDecision(best).p.stop)}, objectifs ${fmt(agentTradeDecision(best).p.target1)} puis ${fmt(agentTradeDecision(best).p.target2)}. Taille indicative : ${positionSizeHTML(best)}.</div></div>`:''}
 ${categoryCards('🏆 Top 10 hors watchlist',ideas)}
 ${categoryCards('⚡ Top day trade',day)}
 ${categoryCards('📈 Top swing',swing)}
 ${categoryCards('🧠 IA / Semi-conducteurs',semi)}
 ${categoryCards('☁️ Software / Cloud / Cybersécurité',software)}
 ${categoryCards('🔥 Croissance / Fintech / Conso',growth)}
 `:`<div class="note">Clique sur <b>Scanner marché V18.3</b>. Si après le scan tu vois encore 0 valeur hors watchlist, c’est que l’appel FMP batch ne charge pas l’univers et il faudra regarder la console.</div>`}
 </div>`;
}
async function scanMarketUniverse(){
 const syms=[...new Set(MARKET_UNIVERSE)];
 scanState={active:true,done:0,total:syms.length,label:'Agent marché V18.3'};renderAll();
 let before=marketLoadedItems().length;
 const chunks=[];for(let i=0;i<syms.length;i+=8)chunks.push(syms.slice(i,i+8));
 for(const ch of chunks){
   await loadFmpBatch(ch);
   scanState.done=Math.min(syms.length,scanState.done+ch.length);renderScanner();await wait(120);
 }
 const loaded=marketLoadedItems();
 const errCount=allErrors().filter(x=>MARKET_UNIVERSE.includes(x.w.symbol)).length;
 localStorage.setItem('marketDiag_v18_3',JSON.stringify({last:true,total:syms.length,ok:loaded.length,added:Math.max(0,loaded.length-before),err:errCount,time:new Date().toLocaleTimeString('fr-FR')}));
 marketScanReady=true;localStorage.setItem('marketScanReady_v18_1','1');
 scanState.active=false;renderAll();
 if(loaded.length<30)alert(`Diagnostic V18.3 : seulement ${loaded.length}/${syms.length} valeurs chargées. Probable limite FMP gratuit ou endpoints bloqués. Regarde le bloc diagnostic.`);
}
function addTopMarketToWatchlist(){
 const ideas=topMarketIdeas(10,{preferNew:true});
 if(!ideas.length){alert('Lance d’abord Scanner marché V18.3. Actuellement aucune idée marché chargée.');return}
 let added=0,names=[];
 ideas.forEach(x=>{if(!watchlist.some(w=>w.symbol===x.w.symbol)){watchlist.push({symbol:x.w.symbol,label:x.w.label||x.w.symbol,sector:x.w.sector||marketSector(x.w.symbol)});added++;names.push(x.w.symbol)}});
 saveWatch();renderAll();alert(added?`${added} nouvelles valeurs ajoutées : ${names.join(', ')}`:`Aucune nouvelle valeur ajoutée. Top chargé : ${ideas.map(x=>x.w.symbol).join(', ')}`);
}
