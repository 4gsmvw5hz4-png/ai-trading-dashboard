<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Trading Cockpit</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#05070a;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#111827,#05070a);padding:18px 14px 90px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.small{font-size:12px;color:#93a4bd}
.title{font-size:25px;font-weight:900;letter-spacing:-.8px}
.logo,.apiBtn{border:1px solid rgba(255,255,255,.28);background:#1d2738;border-radius:15px;color:#fff;padding:10px 12px;font-weight:800}
.card{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:14px;margin-bottom:13px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.ai{background:linear-gradient(135deg,rgba(31,111,235,.28),rgba(16,185,129,.17));border-color:rgba(83,163,255,.25)}
.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.ticker{font-size:22px;font-weight:900;letter-spacing:-.5px}
.name{font-size:13px;color:#9fb0c8;margin-top:2px}
.price{text-align:right;font-weight:900;font-size:16px}
.green{color:#34d399}.red{color:#fb7185}.amber{color:#fbbf24}.blue{color:#60a5fa}
.badge{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);font-weight:800}
.buy{color:#34d399;background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.3)}
.sell{color:#fb7185;background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.3)}
.watch{color:#60a5fa;background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3)}
.wait{color:#cbd5e1}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}
.metric{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px}
.metric .l{font-size:11px;color:#9fb0c8}.metric .v{font-weight:900;font-size:13px;margin-top:3px}
.note{font-size:13px;line-height:1.35;color:#dbeafe;margin-top:12px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.82);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px)}
.navin{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}
.nav button{border:0;border-radius:17px;padding:13px 8px;background:transparent;color:#9fb0c8;font-weight:800}
.nav button.active{background:white;color:#05070a}
.hidden{display:none}
input,select{width:100%;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.23);color:#fff;border-radius:14px;padding:12px;margin:5px 0 9px}
button.primary{width:100%;border:0;border-radius:17px;background:white;color:#05070a;padding:13px;font-weight:900;margin-top:8px}
button.secondary{width:100%;border:1px solid rgba(255,255,255,.18);border-radius:17px;background:rgba(255,255,255,.07);color:#fff;padding:12px;font-weight:800;margin-top:8px}
textarea{width:100%;min-height:90px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.23);color:white;border-radius:14px;padding:12px}
hr{border:0;border-top:1px solid rgba(255,255,255,.1);margin:13px 0}
.kv{font-size:12px;color:#9fb0c8}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="small">AI Trading Cockpit</div>
      <div class="title">Market Scanner</div>
    </div>
    <button class="apiBtn" onclick="setApiKey()">API</button>
  </header>

  <section id="scanner"></section>
  <section id="portfolio" class="hidden"></section>
  <section id="alerts" class="hidden"></section>
</div>

<nav class="nav">
  <div class="navin">
    <button class="active" onclick="show('scanner',this)">Scanner</button>
    <button onclick="show('portfolio',this)">Portfolio</button>
    <button onclick="show('alerts',this)">Alertes</button>
  </div>
</nav>

<script>
const DEFAULT_WATCHLIST = [
  {symbol:"NVDA", label:"Nvidia", sector:"AI / Semi-conducteurs"},
  {symbol:"AMD", label:"AMD", sector:"Semi-conducteurs"},
  {symbol:"MU", label:"Micron", sector:"Mémoire / Semi-conducteurs"},
  {symbol:"QCOM", label:"Qualcomm", sector:"Semi-conducteurs"},
  {symbol:"AVGO", label:"Broadcom", sector:"AI / Semi-conducteurs"},
  {symbol:"PLTR", label:"Palantir", sector:"AI Software"},
  {symbol:"MSFT", label:"Microsoft", sector:"Cloud / AI"},
  {symbol:"ADBE", label:"Adobe", sector:"Software"},
  {symbol:"YETI", label:"Yeti", sector:"Consumer"},
  {symbol:"RACE", label:"Ferrari", sector:"Luxe / Auto"},
  {symbol:"STLA", label:"Stellantis", sector:"Auto"},
  {symbol:"FDJ", label:"FDJ", sector:"Dividende / Europe"}
];

const DEFAULT_PORTFOLIO = [
  {symbol:"YETI", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"QCOM", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"ADBE", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"MSFT", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"Silver Future", type:"Future / ETF", lev:"", buy:"", qty:"", target:"", stop:""},
  {symbol:"RACE", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"STLA", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"FDJ", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""}
];

let watchlist = JSON.parse(localStorage.getItem("watchlist")||"null") || DEFAULT_WATCHLIST;
let portfolio = JSON.parse(localStorage.getItem("portfolio")||"null") || DEFAULT_PORTFOLIO;

function apiKey(){ return localStorage.getItem("TWELVE_API_KEY") || ""; }
function setApiKey(){
  const k = prompt("Colle ta clé API Twelve Data :", apiKey());
  if(k !== null){ localStorage.setItem("TWELVE_API_KEY", k.trim()); alert("Clé enregistrée. Clique ensuite sur Charger / Actualiser."); }
}
function cacheKey(symbol){ return "quote_cache_"+symbol; }
function getCache(symbol){
  try { return JSON.parse(localStorage.getItem(cacheKey(symbol))||"null"); } catch(e){ return null; }
}
function setCache(symbol,data){ localStorage.setItem(cacheKey(symbol), JSON.stringify({time:Date.now(),data})); }
function isFresh(c){ return c && (Date.now()-c.time) < 15*60*1000; }

async function fetchTD(symbol){
  const key = apiKey();
  if(!key) throw new Error("Ajoute ta clé API Twelve Data.");
  const url = `https://api.twelvedata.com/quote?symbol=${encodeURIComponent(symbol)}&apikey=${key}`;
  const r = await fetch(url);
  const j = await r.json();
  if(j.status==="error" || j.code || j.message) throw new Error(j.message || "Erreur API");
  return j;
}
async function loadSymbol(symbol, force=false){
  const c = getCache(symbol);
  if(!force && isFresh(c)) return c.data;
  const data = await fetchTD(symbol);
  setCache(symbol,data);
  return data;
}
function num(x){ const n = Number(x); return isFinite(n)?n:null; }
function fmt(n){ return n===null || n===undefined || isNaN(n) ? "-" : "$"+Number(n).toFixed(2); }
function pct(v){ const n=num(v); if(n===null) return "-"; return (n>=0?"+":"")+n.toFixed(2)+"%"; }

function score(q){
  const p = num(q.percent_change) ?? 0;
  const close = num(q.close) ?? num(q.previous_close) ?? 0;
  const open = num(q.open) ?? close;
  const high = num(q.high) ?? close;
  const low = num(q.low) ?? close;
  let s = 50;
  if(p > 0) s += 8;
  if(p > 2) s += 8;
  if(p < -2) s -= 8;
  if(close > open) s += 7;
  if(close < open) s -= 5;
  const range = high-low;
  if(range && close > low + range*0.65) s += 7;
  if(range && close < low + range*0.3) s -= 7;
  return Math.max(0, Math.min(100, Math.round(s)));
}
function signal(q){
  const p = num(q.percent_change) ?? 0;
  const s = score(q);
  const close = num(q.close), open=num(q.open), high=num(q.high), low=num(q.low);
  const nearLow = close && low && high && (close-low)/(high-low || 1) < .35;
  const nearHigh = close && low && high && (close-low)/(high-low || 1) > .75;
  if(p <= -3 && s >= 45) return ["Zone achat", "buy"];
  if(p >= 4 || nearHigh) return ["Prendre profit", "sell"];
  if(s >= 63) return ["Surveiller achat", "watch"];
  if(nearLow && p < 0) return ["Repli à surveiller", "watch"];
  return ["Attendre", "wait"];
}
function aiComment(q){
  const p = num(q.percent_change) ?? 0;
  const [sig] = signal(q);
  const s = score(q);
  if(sig==="Zone achat") return "Correction forte : entrée possible uniquement si le marché confirme. Stop obligatoire.";
  if(sig==="Prendre profit") return "Titre tendu à court terme : envisager prise de bénéfice partielle ou stop relevé.";
  if(sig==="Surveiller achat") return "Momentum correct : intéressant sur repli ou cassure avec volume.";
  if(s < 45) return "Setup fragile : attendre un meilleur point d’entrée.";
  return "Pas de signal fort : surveiller support/résistance avant d’agir.";
}

function renderScanner(){
  const box = document.getElementById("scanner");
  const loaded = watchlist.map(w => ({...w, cache:getCache(w.symbol)})).filter(x=>x.cache);
  const cards = loaded.map(x=>cardHTML(x, x.cache.data)).join("");
  box.innerHTML = `
    <div class="card ai">
      <div class="small">Résumé IA</div>
      <div class="note">Scanner multi-actions avec cache 15 min pour éviter les limites Twelve Data. Charge les actions une par une puis l’IA classe les signaux.</div>
      <button class="primary" onclick="loadNext()">Charger prochaine action</button>
      <button class="secondary" onclick="refreshAllCached()">Actualiser les actions chargées</button>
    </div>
    <div class="card">
      <b>Watchlist</b>
      <div class="kv">Actions : ${watchlist.map(x=>x.symbol).join(", ")}</div>
      <hr>
      <input id="newSymbol" placeholder="Ajouter ticker ex: AMZN, TSLA, META">
      <button class="secondary" onclick="addWatch()">Ajouter à la watchlist</button>
    </div>
    ${cards || `<div class="card"><b>Aucune donnée chargée.</b><div class="note">Clique sur “Charger prochaine action”. Si tu as une erreur de limite, attends une minute.</div></div>`}
  `;
}
function cardHTML(w,q){
  const sc = score(q);
  const [lab,tone] = signal(q);
  const change = num(q.percent_change);
  return `<div class="card">
    <div class="row">
      <div><span class="ticker">${w.symbol}</span> <span class="badge ${tone}">${lab}</span><div class="name">${q.name || w.label} · ${w.sector}</div></div>
      <div class="price">${fmt(num(q.close))}<br><span class="${change>=0?'green':'red'}">${pct(change)}</span></div>
    </div>
    <div class="grid">
      <div class="metric"><div class="l">Open</div><div class="v">${fmt(num(q.open))}</div></div>
      <div class="metric"><div class="l">High/Low</div><div class="v">${fmt(num(q.high))} / ${fmt(num(q.low))}</div></div>
      <div class="metric"><div class="l">Score IA</div><div class="v">${sc}/100</div></div>
    </div>
    <div class="note">${aiComment(q)}</div>
  </div>`;
}
async function loadNext(){
  const next = watchlist.find(w => !getCache(w.symbol) || !isFresh(getCache(w.symbol)));
  if(!next){ alert("Toutes les actions sont déjà chargées récemment."); return; }
  try { await loadSymbol(next.symbol,true); renderScanner(); renderPortfolio(); renderAlerts(); }
  catch(e){ alert(e.message); }
}
async function refreshAllCached(){
  const symbols = watchlist.filter(w=>getCache(w.symbol)).map(w=>w.symbol);
  if(!symbols.length) return alert("Aucune action chargée.");
  for(const s of symbols){
    try{ await loadSymbol(s,true); }catch(e){ alert("Erreur "+s+": "+e.message); break; }
    await new Promise(r=>setTimeout(r,800));
  }
  renderScanner(); renderPortfolio(); renderAlerts();
}
function addWatch(){
  const v=document.getElementById("newSymbol").value.trim().toUpperCase();
  if(!v) return;
  watchlist.push({symbol:v,label:v,sector:"Custom"});
  localStorage.setItem("watchlist",JSON.stringify(watchlist));
  renderScanner();
}

function renderPortfolio(){
  const box = document.getElementById("portfolio");
  const rows = portfolio.map((p,i)=>{
    const c=getCache(p.symbol); const q=c?.data; const cur = q?num(q.close):null;
    const buy=num(p.buy), qty=num(p.qty);
    const pnl = cur&&buy&&qty ? (cur-buy)*qty : null;
    const perf = cur&&buy ? ((cur-buy)/buy*100) : null;
    return `<div class="card">
      <div class="row"><div><span class="ticker">${p.symbol}</span><div class="name">${p.type} · ${p.lev||"levier ?"}</div></div><div class="price">${cur?fmt(cur):"Non chargé"}<br><span class="${(perf||0)>=0?'green':'red'}">${perf!==null?pct(perf):""}</span></div></div>
      <div class="grid">
        <div class="metric"><div class="l">Achat</div><div class="v">${p.buy||"-"}</div></div>
        <div class="metric"><div class="l">Qté</div><div class="v">${p.qty||"-"}</div></div>
        <div class="metric"><div class="l">P/L</div><div class="v">${pnl!==null?(pnl>=0?"+":"")+pnl.toFixed(0):"-"}</div></div>
      </div>
      <button class="secondary" onclick="editPosition(${i})">Modifier position</button>
    </div>`
  }).join("");
  box.innerHTML = `
  <div class="card ai"><b>Portefeuille</b><div class="note">Entre tes prix d’achat et quantités. L’app calculera P/L et alertes avec les prix chargés.</div></div>
  ${rows}
  <div class="card"><b>Ajouter une position</b><input id="ps" placeholder="Ticker ex: AMZN"><select id="pt"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini Future</option><option>Call option</option><option>Put option</option></select><input id="pl" placeholder="Levier ex: x1, x3"><input id="pb" placeholder="Prix achat"><input id="pq" placeholder="Quantité"><input id="pst" placeholder="Stop"><input id="pta" placeholder="Objectif"><button class="primary" onclick="addPosition()">Ajouter</button></div>`;
}
function editPosition(i){
  const p=portfolio[i];
  p.buy = prompt("Prix d’achat", p.buy)||p.buy;
  p.qty = prompt("Quantité", p.qty)||p.qty;
  p.stop = prompt("Stop loss", p.stop)||p.stop;
  p.target = prompt("Objectif", p.target)||p.target;
  localStorage.setItem("portfolio",JSON.stringify(portfolio));
  renderPortfolio(); renderAlerts();
}
function addPosition(){
  const p={symbol:ps.value.trim().toUpperCase(),type:pt.value,lev:pl.value,buy:pb.value,qty:pq.value,stop:pst.value,target:pta.value};
  if(!p.symbol) return;
  portfolio.push(p);
  localStorage.setItem("portfolio",JSON.stringify(portfolio));
  renderPortfolio();
}
function renderAlerts(){
  const arr=[];
  watchlist.forEach(w=>{ const q=getCache(w.symbol)?.data; if(!q)return; const [lab]=signal(q); if(lab!=="Attendre") arr.push(`${w.symbol}: ${lab} — ${aiComment(q)}`); });
  portfolio.forEach(p=>{ const q=getCache(p.symbol)?.data; if(!q)return; const cur=num(q.close), stop=num(p.stop), target=num(p.target); if(stop&&cur<=stop) arr.push(`${p.symbol}: stop touché ou proche.`); if(target&&cur>=target) arr.push(`${p.symbol}: objectif atteint, envisager prise de profit.`); });
  document.getElementById("alerts").innerHTML = `<div class="card ai"><b>Alertes IA</b><div class="note">Alertes basées sur prix live chargés, variation du jour, score IA et ton portefeuille.</div></div>` + (arr.map(a=>`<div class="card"><b>${a}</b></div>`).join("") || `<div class="card">Aucune alerte forte pour l’instant.</div>`);
}
function show(id,btn){
  ["scanner","portfolio","alerts"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
renderScanner(); renderPortfolio(); renderAlerts();
</script>
</body>
</html>
