<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Trading Cockpit</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#05070a;color:white;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#0f1724,#05070a);padding:22px 14px 88px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.small{font-size:12px;color:#8fa0b8}.title{font-size:27px;font-weight:900}.api{border:1px solid #fff;border-radius:14px;padding:12px 14px;background:#1d2738;color:white;font-weight:800}.card{background:linear-gradient(180deg,#1b2332,#121926);border:1px solid #2e3a50;border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 10px 30px #0005}.ai{background:linear-gradient(135deg,#153056,#0d3b3a)}.row{display:flex;justify-content:space-between;gap:12px}.ticker{font-size:22px;font-weight:900}.pill{font-size:11px;border:1px solid #35506e;background:#202d41;color:#d9e7ff;border-radius:999px;padding:5px 9px}.buy{background:#0b3a2e;color:#68ffd0;border-color:#1b705b}.sell{background:#3a1321;color:#ff8aa5;border-color:#8a2d45}.wait{background:#232b3a;color:#cbd5e1}.price{text-align:right;font-weight:900}.green{color:#55f5ae}.red{color:#ff8ea0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:13px}.metric{background:#0d111a;border:1px solid #263145;border-radius:13px;padding:10px}.metric span{display:block;color:#9badc5;font-size:11px}.metric b{font-size:14px}.nav{position:fixed;bottom:0;left:0;right:0;background:#05070add;backdrop-filter:blur(12px);border-top:1px solid #1f2937}.navin{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.nav button{border:0;border-radius:16px;padding:13px;background:transparent;color:#91a0b6;font-weight:800}.nav button.active{background:white;color:black}.hidden{display:none}.input{width:100%;margin:7px 0;padding:13px;border-radius:13px;border:1px solid #334155;background:#0b1220;color:white}.btn{width:100%;border:0;border-radius:16px;padding:14px;background:white;color:black;font-weight:900;margin-top:10px}.error{color:#ff93a9;font-size:13px;line-height:1.45}.muted{color:#90a0b8;font-size:13px}.loader{padding:30px;text-align:center;color:#9fb2d0}.summary{font-size:14px;line-height:1.5}.footer-note{font-size:11px;color:#6f819a;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div><div class="small">AI Trading Cockpit</div><div class="title">Market Scanner</div></div><button class="api" onclick="setApi()">API</button></div>
  <section id="scanner"></section>
  <section id="portfolio" class="hidden"></section>
  <section id="alerts" class="hidden"></section>
</div>
<nav class="nav"><div class="navin"><button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('alerts',this)">Alertes</button></div></nav>
<script>
const symbols = ["NVDA"]
let apiKey=localStorage.getItem('TWELVE_API_KEY')||'';
let market=[];
let positions=JSON.parse(localStorage.getItem('positions')||'[]');
function setApi(){const k=prompt('Colle ta clé API Twelve Data',apiKey||'');if(k){apiKey=k.trim();localStorage.setItem('TWELVE_API_KEY',apiKey);load();}}
function sig(rsi,change){if(rsi>=72)return ['Prendre profit','sell'];if(rsi<=35)return ['Zone achat','buy'];if(change>2.5)return ['Momentum fort','buy'];return ['Attendre','wait'];}
function calcRSI(closes,period=14){if(!closes||closes.length<period+1)return null;let gains=0,losses=0;for(let i=1;i<=period;i++){let d=closes[i]-closes[i-1]; if(d>=0)gains+=d; else losses-=d;} let avgGain=gains/period,avgLoss=losses/period;for(let i=period+1;i<closes.length;i++){let d=closes[i]-closes[i-1];avgGain=(avgGain*(period-1)+Math.max(d,0))/period;avgLoss=(avgLoss*(period-1)+Math.max(-d,0))/period;} if(avgLoss===0)return 100;let rs=avgGain/avgLoss;return Math.round(100-(100/(1+rs)));}
async function fetchQuote(sym){const q=await fetch(`https://api.twelvedata.com/quote?symbol=${sym}&apikey=${apiKey}`);const quote=await q.json(); if(quote.code) throw new Error(quote.message||'API error'); const ts=await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=1day&outputsize=40&apikey=${apiKey}`); const hist=await ts.json(); let closes=(hist.values||[]).slice().reverse().map(x=>parseFloat(x.close)).filter(Boolean); return {ticker:sym,name:quote.name||sym,price:parseFloat(quote.close||quote.price||0),change:parseFloat(quote.percent_change||0),rsi:calcRSI(closes),sector:'US stock'};}
async function load(){const s=document.getElementById('scanner');if(!apiKey){s.innerHTML=`<div class="card"><b>Clé API Twelve Data requise</b><p class="muted">Clique sur API en haut à droite et colle ta clé.</p><button class="btn" onclick="setApi()">Ajouter la clé API</button></div>`;renderPortfolio();renderAlerts();return;} s.innerHTML='<div class="loader">Chargement des données Twelve Data...</div>';try{market=[];for(const sym of symbols){market.push(await fetchQuote(sym)); await new Promise(r=>setTimeout(r,250));}renderScanner();renderPortfolio();renderAlerts();}catch(e){s.innerHTML=`<div class="card"><b>Erreur données</b><p class="error">${e.message}</p><button class="btn" onclick="setApi()">Modifier la clé API</button><p class="footer-note">Possible limite du plan gratuit Twelve Data.</p></div>`;}}
function renderScanner(){let best=market.filter(x=>x.rsi&&x.rsi<45).map(x=>x.ticker).join(', ')||'aucune zone claire';document.getElementById('scanner').innerHTML=`<div class="card ai"><div class="small">Résumé IA</div><p class="summary">Surveillance tech/semis. Zones d’achat potentielles: ${best}. RSI élevé = discipline prise de profit. Données chargées depuis Twelve Data.</p></div>`+market.map(x=>{let [l,c]=sig(x.rsi||50,x.change||0);return `<div class="card"><div class="row"><div><span class="ticker">${x.ticker}</span> <span class="pill ${c}">${l}</span><div class="muted">${x.name}</div></div><div class="price">$${x.price.toFixed(2)}<br><span class="${x.change>=0?'green':'red'}">${x.change>=0?'+':''}${x.change.toFixed(2)}%</span></div></div><div class="grid"><div class="metric"><span>RSI</span><b>${x.rsi??'n/a'}</b></div><div class="metric"><span>Trend</span><b>${x.change>=0?'Bullish':'Weak'}</b></div><div class="metric"><span>Score</span><b>${score(x)}/100</b></div></div></div>`}).join('');}
function score(x){let r=50;if(x.rsi&&x.rsi<35)r+=18;if(x.rsi&&x.rsi>70)r-=15;if(x.change>0)r+=10;if(x.change>3)r+=8;if(['NVDA','AMD','MU','QCOM','AVGO'].includes(x.ticker))r+=10;return Math.max(0,Math.min(100,Math.round(r)));}
function addPos(){let asset=document.getElementById('pa').value.toUpperCase();let type=document.getElementById('pt').value;let lev=document.getElementById('pl').value;let buy=parseFloat(document.getElementById('pb').value);let qty=parseFloat(document.getElementById('pq').value);if(!asset||!buy||!qty)return alert('Remplis actif, prix et quantité');positions.push({asset,type,lev,buy,qty,date:new Date().toISOString().slice(0,10)});localStorage.setItem('positions',JSON.stringify(positions));renderPortfolio();renderAlerts();}
function renderPortfolio(){let html=`<div class="card"><b>Ajouter une position</b><input id="pa" class="input" placeholder="Ticker / actif ex: MU"><select id="pt" class="input"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini future</option><option>Call option</option><option>Put option</option></select><input id="pl" class="input" placeholder="Levier ex: x1, x3"><input id="pb" class="input" placeholder="Prix achat"><input id="pq" class="input" placeholder="Quantité"><button class="btn" onclick="addPos()">Ajouter</button></div>`;html+=positions.map((p,i)=>{let m=market.find(x=>x.ticker===p.asset);let cur=m?m.price:p.buy;let perf=((cur-p.buy)/p.buy)*100;let pnl=(cur-p.buy)*p.qty;return `<div class="card"><div class="row"><div><b>${p.asset}</b><div class="muted">${p.type} · ${p.lev||'x1'} · ${p.date}</div></div><div class="price ${perf>=0?'green':'red'}">${perf.toFixed(2)}%<br>${pnl>=0?'+':''}$${pnl.toFixed(0)}</div></div><button class="btn" onclick="positions.splice(${i},1);localStorage.setItem('positions',JSON.stringify(positions));renderPortfolio();renderAlerts();">Supprimer</button></div>`}).join('');document.getElementById('portfolio').innerHTML=html;}
function renderAlerts(){let alerts=[];market.forEach(x=>{if(x.rsi>=70)alerts.push(`${x.ticker}: RSI suracheté, surveiller prise de profit.`);if(x.rsi<=35)alerts.push(`${x.ticker}: RSI survendu, possible zone d’entrée.`);if(x.change>4)alerts.push(`${x.ticker}: momentum très fort aujourd’hui.`);});document.getElementById('alerts').innerHTML=(alerts.length?alerts:['Aucune alerte forte pour le moment.']).map(a=>`<div class="card">⚠️ ${a}</div>`).join('');}
function show(id,btn){['scanner','portfolio','alerts'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
load();
</script>
</body>
</html>
