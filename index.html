<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Trading Cockpit V5</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#05070a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{width:100%;max-width:1500px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#111827,#05070a);padding:18px 18px 92px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.small{font-size:12px;color:#93a4bd}.title{font-size:26px;font-weight:900;letter-spacing:-.8px}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn,.apiBtn{border:1px solid rgba(255,255,255,.25);background:#1d2738;border-radius:15px;color:#fff;padding:10px 12px;font-weight:900;cursor:pointer}
.card{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.ai{background:linear-gradient(135deg,rgba(31,111,235,.28),rgba(16,185,129,.17));border-color:rgba(83,163,255,.25)}
.layout{display:grid;grid-template-columns:360px 1fr;gap:14px;align-items:start}
.side{display:flex;flex-direction:column;gap:13px;position:sticky;top:14px}
.stockGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.portfolioGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.ticker{font-size:22px;font-weight:900;letter-spacing:-.5px}.name{font-size:12px;color:#9fb0c8;margin-top:2px;line-height:1.25}
.price{text-align:right;font-weight:900;font-size:16px;min-width:70px}
.green{color:#34d399}.red{color:#fb7185}.amber{color:#fbbf24}.blue{color:#60a5fa}.muted{color:#9fb0c8}
.badge{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);font-weight:900;white-space:nowrap}
.buy{color:#34d399;background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.3)}
.sell{color:#fb7185;background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.3)}
.watch{color:#60a5fa;background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3)}
.daytrade{color:#fbbf24;background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3)}
.error{color:#fb7185;background:rgba(251,113,133,.09);border-color:rgba(251,113,133,.25)}
.wait{color:#cbd5e1}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:8px}
.metric{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:9px}
.metric .l{font-size:10px;color:#9fb0c8}.metric .v{font-weight:900;font-size:12px;margin-top:3px;word-break:break-word}
.note{font-size:12px;line-height:1.35;color:#dbeafe;margin-top:10px}.warn{font-size:12px;line-height:1.35;color:#fbbf24;margin-top:8px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.82);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);z-index:10}
.navin{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
.nav button{border:0;border-radius:17px;padding:12px 6px;background:transparent;color:#9fb0c8;font-weight:900;cursor:pointer}.nav button.active{background:white;color:#05070a}
.hidden{display:none!important}
input,select{width:100%;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.23);color:#fff;border-radius:14px;padding:12px;margin:5px 0 9px}
button.primary{width:100%;border:0;border-radius:17px;background:white;color:#05070a;padding:13px;font-weight:900;margin-top:8px;cursor:pointer}
button.secondary{width:100%;border:1px solid rgba(255,255,255,.18);border-radius:17px;background:rgba(255,255,255,.07);color:#fff;padding:12px;font-weight:900;margin-top:8px;cursor:pointer}
button.danger{width:100%;border:1px solid rgba(251,113,133,.35);border-radius:17px;background:rgba(251,113,133,.12);color:#fb7185;padding:12px;font-weight:900;margin-top:8px;cursor:pointer}
hr{border:0;border-top:1px solid rgba(255,255,255,.1);margin:13px 0}.kv{font-size:12px;color:#9fb0c8;line-height:1.35}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,#fb7185,#fbbf24,#34d399);width:50%}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar button{flex:1;min-width:120px}
.compact .extra{display:none}
.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid rgba(255,255,255,.08);padding:10px 8px;text-align:left}.table th{color:#9fb0c8;font-size:11px;text-transform:uppercase}
.alertList{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.chip{display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.22);border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}
.chip button{border:0;background:rgba(251,113,133,.18);color:#fb7185;border-radius:999px;width:19px;height:19px;cursor:pointer;font-weight:900}
.filterbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.filterbar button{width:auto;margin:0;padding:9px 12px;border-radius:999px}
@media (max-width:800px){.app{max-width:450px;padding:18px 14px 92px}.layout{display:block}.side{position:static;margin-bottom:13px}.stockGrid,.portfolioGrid,.alertList{grid-template-columns:1fr}.title{font-size:25px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div><div class="small">AI Trading Cockpit V5</div><div class="title">Trading Scanner</div></div>
  <div class="actions"><button class="btn" onclick="toggleCompact()">Vue compacte</button><button class="apiBtn" onclick="setApiKey()">API</button></div>
</header>
<section id="scanner"></section>
<section id="daytrading" class="hidden"></section>
<section id="portfolio" class="hidden"></section>
<section id="alerts" class="hidden"></section>
</div>
<nav class="nav"><div class="navin">
<button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('daytrading',this)">Day</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('alerts',this)">Alertes</button>
</div></nav>
<script>
const DEFAULT_WATCHLIST = [
  {symbol:"NVDA", label:"Nvidia", sector:"AI / Semi-conducteurs"},
  {symbol:"AMD", label:"AMD", sector:"Semi-conducteurs"},
  {symbol:"MU", label:"Micron", sector:"Mémoire / Semi-conducteurs"},
  {symbol:"QCOM", label:"Qualcomm", sector:"Semi-conducteurs"},
  {symbol:"AVGO", label:"Broadcom", sector:"AI / Semi-conducteurs"},
  {symbol:"PLTR", label:"Palantir", sector:"AI Software"},
  {symbol:"MSFT", label:"Microsoft", sector:"Cloud / AI"},
  {symbol:"ADBE", label:"Adobe", sector:"Software"},
  {symbol:"YETI", label:"Yeti", sector:"Consumer"},
  {symbol:"RACE", label:"Ferrari US ADR", sector:"Luxe / Auto"},
  {symbol:"STLA", label:"Stellantis", sector:"Auto"},
  {symbol:"XAG/USD", label:"Silver spot", sector:"Métaux précieux"},
  {symbol:"QQQ", label:"Nasdaq ETF", sector:"Indice / Tech"},
  {symbol:"SPY", label:"S&P 500 ETF", sector:"Indice US"},
  {symbol:"META", label:"Meta", sector:"AI / Social"},
  {symbol:"AMZN", label:"Amazon", sector:"Cloud / Consumer"},
  {symbol:"TSLA", label:"Tesla", sector:"EV / Tech"}
];
const DEFAULT_PORTFOLIO = [
  {symbol:"YETI", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"QCOM", type:"Mini future", lev:"", buy:"", qty:"", target:"", stop:""},
  {symbol:"ADBE", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"MSFT", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"XAG/USD", type:"Silver / Future", lev:"", buy:"", qty:"", target:"", stop:""},
  {symbol:"RACE", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""},
  {symbol:"STLA", type:"Action", lev:"x1", buy:"", qty:"", target:"", stop:""}
];
let watchlist = JSON.parse(localStorage.getItem("watchlist_v5")||"null") || DEFAULT_WATCHLIST;
let portfolio = JSON.parse(localStorage.getItem("portfolio_v5")||"null") || DEFAULT_PORTFOLIO;
let compact = localStorage.getItem("compact_v5")==="1";
let currentFilter = "all";

function saveWatch(){ localStorage.setItem("watchlist_v5",JSON.stringify(watchlist)); }
function savePort(){ localStorage.setItem("portfolio_v5",JSON.stringify(portfolio)); }
function apiKey(){ return localStorage.getItem("TWELVE_API_KEY") || ""; }
function setApiKey(){ const k=prompt("Colle ta clé API Twelve Data :",apiKey()); if(k!==null){localStorage.setItem("TWELVE_API_KEY",k.trim()); alert("Clé enregistrée.");}}
function toggleCompact(){ compact=!compact; localStorage.setItem("compact_v5",compact?"1":"0"); renderAll(); }
function ck(type,symbol){ return type+"_"+symbol.replaceAll("/","_");}
function getC(type,symbol){try{return JSON.parse(localStorage.getItem(ck(type,symbol))||"null")}catch(e){return null}}
function setC(type,symbol,data){localStorage.setItem(ck(type,symbol),JSON.stringify({time:Date.now(),data}));}
function setErr(symbol,msg){localStorage.setItem(ck("err",symbol),JSON.stringify({time:Date.now(),msg}));}
function getErr(symbol){try{return JSON.parse(localStorage.getItem(ck("err",symbol))||"null")}catch(e){return null}}
function clearErr(symbol){localStorage.removeItem(ck("err",symbol));}
function fresh(c,min=15){return c&&Date.now()-c.time<min*60*1000}
function num(x){const n=Number(x);return isFinite(n)?n:null}
function fmt(n){return n===null||n===undefined||isNaN(n)?"-":"$"+Number(n).toFixed(2)}
function pct(v){const n=num(v);if(n===null)return "-";return(n>=0?"+":"")+n.toFixed(2)+"%"}
function cls(n){return(num(n)||0)>=0?"green":"red"}

async function td(path,params){
 const key=apiKey(); if(!key) throw new Error("Ajoute ta clé Twelve Data via API.");
 const qs=new URLSearchParams({...params,apikey:key}); const r=await fetch(`https://api.twelvedata.com/${path}?${qs.toString()}`); const j=await r.json();
 if(j.status==="error"||j.code||j.message) throw new Error(j.message||"Erreur API"); return j;
}
async function loadQuote(symbol,force=false){const c=getC("quote",symbol); if(!force&&fresh(c,15))return c.data; const j=await td("quote",{symbol}); setC("quote",symbol,j); return j;}
async function loadDaily(symbol,force=false){const c=getC("daily",symbol); if(!force&&fresh(c,60))return c.data; const j=await td("time_series",{symbol,interval:"1day",outputsize:"220"}); setC("daily",symbol,j); return j;}
async function loadIntraday(symbol,force=false){const c=getC("intra",symbol); if(!force&&fresh(c,5))return c.data; const j=await td("time_series",{symbol,interval:"5min",outputsize:"78"}); setC("intra",symbol,j); return j;}

function values(ts){return(ts?.values||[]).slice().reverse().map(x=>({date:x.datetime,open:num(x.open),high:num(x.high),low:num(x.low),close:num(x.close),volume:num(x.volume)||0})).filter(x=>x.close)}
function SMA(arr,p){if(arr.length<p)return null;return arr.slice(-p).reduce((a,b)=>a+b.close,0)/p}
function RSI(arr,p=14){if(arr.length<p+1)return null;let gains=0,losses=0;const s=arr.slice(-(p+1));for(let i=1;i<s.length;i++){const d=s[i].close-s[i-1].close;if(d>=0)gains+=d;else losses-=d}if(losses===0)return 100;const rs=(gains/p)/(losses/p);return 100-(100/(1+rs))}
function ATR(arr,p=14){if(arr.length<p+1)return null;let trs=[];for(let i=1;i<arr.length;i++){const h=arr[i].high,l=arr[i].low,pc=arr[i-1].close;trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)))}return trs.slice(-p).reduce((a,b)=>a+b,0)/p}
function support(arr,p=30){if(arr.length<p)return null;return Math.min(...arr.slice(-p).map(x=>x.low))}
function resistance(arr,p=30){if(arr.length<p)return null;return Math.max(...arr.slice(-p).map(x=>x.high))}
function trend(arr){const s20=SMA(arr,20),s50=SMA(arr,50),s200=SMA(arr,200),c=arr.at(-1)?.close;if(!s20||!s50)return"n/a";if(c>s20&&s20>s50&&(!s200||s50>s200))return"Haussière forte";if(c>s20&&s20>s50)return"Haussière";if(c<s20&&s20<s50)return"Baissière";return"Neutre"}
function volumeSignal(arr){if(arr.length<21)return"n/a";const v=arr.at(-1).volume||0,avg=arr.slice(-21,-1).reduce((a,b)=>a+(b.volume||0),0)/20;if(!avg)return"n/a";if(v>avg*1.8)return"Volume très fort";if(v>avg*1.25)return"Volume supérieur";if(v<avg*.7)return"Volume faible";return"Volume normal"}
function technical(symbol){
 const q=getC("quote",symbol)?.data,d=values(getC("daily",symbol)?.data),i=values(getC("intra",symbol)?.data); const arr=d.length?d:null; if(!q||!arr)return null;
 const c=num(q.close)||arr.at(-1).close; const rsi=RSI(arr),rsi5=i.length?RSI(i,14):null,s20=SMA(arr,20),s50=SMA(arr,50),s200=SMA(arr,200),atr=ATR(arr),sup=support(arr),res=resistance(arr);
 const distSup=sup?((c-sup)/c*100):null,distRes=res?((res-c)/c*100):null; const day=num(q.percent_change)||0; let score=50;
 if(rsi!==null){if(rsi<30)score+=16;else if(rsi<40)score+=9;else if(rsi>75)score-=16;else if(rsi>68)score-=8}
 if(s20&&c>s20)score+=8;if(s50&&c>s50)score+=8;if(s200&&c>s200)score+=6;if(s20&&s50&&s20>s50)score+=6;if(s20&&s50&&s20<s50)score-=6;
 if(distSup!==null&&distSup<3)score+=8;if(distRes!==null&&distRes<3)score-=6;if(day>2)score+=4;if(day>5)score-=8;if(day<-4)score+=3;if(volumeSignal(arr).includes("fort"))score+=5;
 score=Math.max(0,Math.min(100,Math.round(score))); let sig="Attendre",tone="wait";
 if(rsi!==null&&rsi<35&&distSup!==null&&distSup<6&&score>=58){sig="Zone achat";tone="buy"}
 else if(score>=70&&day<4){sig="Surveiller achat";tone="watch"}
 else if((rsi!==null&&rsi>70)||(distRes!==null&&distRes<2)||day>5){sig="Prendre profit";tone="sell"}
 else if(i.length&&rsi5!==null&&rsi5<35&&day<0){sig="Day trade possible";tone="daytrade"}
 const advice=makeAdvice({sig,tr:trend(arr)}); return{q,arr,i,c,rsi,rsi5,s20,s50,s200,atr,sup,res,distSup,distRes,score,sig,tone,tr:trend(arr),vol:volumeSignal(arr),day,advice}
}
function makeAdvice(t){if(t.sig==="Prendre profit")return"Titre tendu : prise partielle / stop relevé.";if(t.sig==="Zone achat")return"Zone intéressante : entrée progressive + stop.";if(t.sig==="Surveiller achat")return"Setup correct : surveiller repli ou cassure.";if(t.sig==="Day trade possible")return"Intraday survendu : rebond court possible, stop serré.";if(t.tr==="Baissière")return"Tendance faible : attendre retournement.";return"Pas de signal fort : attendre confirmation."}
function rankLoaded(){return watchlist.map(w=>({w,t:technical(w.symbol),err:getErr(w.symbol)})).filter(x=>x.t).sort((a,b)=>b.t.score-a.t.score)}
function allErrors(){return watchlist.map(w=>({w,err:getErr(w.symbol)})).filter(x=>x.err)}

function filteredList(list){
 if(currentFilter==="all")return list;
 if(currentFilter==="buy")return list.filter(x=>["Zone achat","Surveiller achat","Day trade possible"].includes(x.t.sig));
 if(currentFilter==="sell")return list.filter(x=>x.t.sig==="Prendre profit");
 if(currentFilter==="day")return list.filter(x=>x.t.sig==="Day trade possible"||x.t.rsi5<40);
 if(currentFilter==="strong")return list.filter(x=>x.t.score>=70);
 return list;
}
function renderScanner(){
 const loaded=filteredList(rankLoaded()); const errors=allErrors();
 document.getElementById("scanner").innerHTML=`
 <div class="layout">
  <div class="side">
   <div class="card ai"><div class="small">Résumé IA</div><div class="note">${summaryAI(rankLoaded())}</div>
    <div class="toolbar"><button class="primary" onclick="loadNextFull()">Charger prochaine</button><button class="secondary" onclick="refreshLoaded()">Actualiser</button></div>
   </div>
   <div class="card"><b>Watchlist modifiable</b><div class="kv">Clique sur ❌ pour supprimer une action. Une erreur API ne bloque plus les suivantes.</div>
    <div class="chips">${watchlist.map(w=>`<span class="chip">${w.symbol}<button onclick="removeWatch('${w.symbol.replace("'","\\'")}')">×</button></span>`).join("")}</div><hr>
    <input id="newSymbol" placeholder="Ajouter ticker ex: META, AMZN, TSLA, AAPL">
    <button class="secondary" onclick="addWatch()">Ajouter</button>
    <button class="danger" onclick="resetWatch()">Réinitialiser watchlist propre</button>
    <button class="danger" onclick="resetCache()">Vider cache données</button>
   </div>
   <div class="card"><b>Classement rapide</b>${rankingTable(rankLoaded())}</div>
   ${errors.length?`<div class="card"><b>Erreurs ignorées</b><div class="warn">${errors.map(x=>`${x.w.symbol}: ${x.err.msg}`).join("<br>")}</div></div>`:""}
  </div>
  <div>
   <div class="filterbar">
    <button class="secondary" onclick="setFilter('all')">Tous</button>
    <button class="secondary" onclick="setFilter('buy')">Achat</button>
    <button class="secondary" onclick="setFilter('sell')">Vente</button>
    <button class="secondary" onclick="setFilter('day')">Day</button>
    <button class="secondary" onclick="setFilter('strong')">Score 70+</button>
   </div>
   <div class="stockGrid ${compact?'compact':''}">
    ${loaded.map(x=>cardHTML(x.w,x.t)).join("") || `<div class="card"><b>Aucune donnée complète.</b><div class="note">Clique sur “Charger prochaine”.</div></div>`}
   </div>
  </div>
 </div>`;
 renderAlerts();
}
function setFilter(f){currentFilter=f; renderScanner()}
function summaryAI(list){if(!list.length)return"Charge quelques actions pour obtenir un classement IA.";const top=list[0],sell=list.find(x=>x.t.sig==="Prendre profit"),buy=list.find(x=>["Zone achat","Day trade possible"].includes(x.t.sig));let s=`Meilleur score : ${top.w.symbol} (${top.t.score}/100). `;if(buy)s+=`Opportunité : ${buy.w.symbol} — ${buy.t.sig}. `;if(sell)s+=`Prise de profit à surveiller : ${sell.w.symbol}. `;s+="Toujours valider avec gestion du risque.";return s}
function rankingTable(list){if(!list.length)return`<div class="note">Charge quelques actions.</div>`;return`<table class="table"><tr><th>Ticker</th><th>Signal</th><th>Score</th></tr>${list.slice(0,10).map(x=>`<tr><td>${x.w.symbol}</td><td>${x.t.sig}</td><td>${x.t.score}</td></tr>`).join("")}</table>`}
function cardHTML(w,t){return`<div class="card"><div class="row"><div><span class="ticker">${w.symbol}</span> <span class="badge ${t.tone}">${t.sig}</span><div class="name">${t.q.name||w.label} · ${w.sector}</div></div><div class="price">${fmt(t.c)}<br><span class="${cls(t.day)}">${pct(t.day)}</span></div></div>
 <div class="grid"><div class="metric"><div class="l">RSI D</div><div class="v">${t.rsi?Math.round(t.rsi):"-"}</div></div><div class="metric"><div class="l">RSI 5m</div><div class="v">${t.rsi5?Math.round(t.rsi5):"-"}</div></div><div class="metric"><div class="l">Score</div><div class="v">${t.score}/100</div></div></div>
 <div class="grid extra"><div class="metric"><div class="l">SMA20</div><div class="v">${fmt(t.s20)}</div></div><div class="metric"><div class="l">SMA50</div><div class="v">${fmt(t.s50)}</div></div><div class="metric"><div class="l">SMA200</div><div class="v">${fmt(t.s200)}</div></div></div>
 <div class="grid extra"><div class="metric"><div class="l">Support</div><div class="v">${fmt(t.sup)}</div></div><div class="metric"><div class="l">Résistance</div><div class="v">${fmt(t.res)}</div></div><div class="metric"><div class="l">ATR</div><div class="v">${fmt(t.atr)}</div></div></div>
 <div class="grid2 extra"><div class="metric"><div class="l">Tendance</div><div class="v">${t.tr}</div></div><div class="metric"><div class="l">Volume</div><div class="v">${t.vol}</div></div></div>
 <div class="progress"><div class="bar" style="width:${t.score}%"></div></div><div class="note">${t.advice}</div></div>`}
async function loadNextFull(){
 const next=watchlist.find(w=>!technical(w.symbol) && !getErr(w.symbol));
 if(!next){alert("Toutes les actions possibles sont chargées ou en erreur.");return}
 await loadFull(next.symbol);
}
async function loadFull(symbol){
 try{clearErr(symbol);await loadQuote(symbol,true);await new Promise(r=>setTimeout(r,700));await loadDaily(symbol,true);await new Promise(r=>setTimeout(r,700));try{await loadIntraday(symbol,true)}catch(e){}}
 catch(e){setErr(symbol,e.message)}
 renderAll();
}
async function refreshLoaded(){
 const syms=watchlist.filter(w=>technical(w.symbol)).map(w=>w.symbol); if(!syms.length)return alert("Aucune action chargée.");
 for(const s of syms){await loadFull(s);await new Promise(r=>setTimeout(r,900))}
}
function addWatch(){const v=document.getElementById("newSymbol").value.trim().toUpperCase();if(!v)return;if(watchlist.some(w=>w.symbol===v))return alert("Déjà dans la watchlist.");watchlist.push({symbol:v,label:v,sector:"Custom"});saveWatch();renderScanner()}
function removeWatch(sym){watchlist=watchlist.filter(w=>w.symbol!==sym);["quote","daily","intra","err"].forEach(t=>localStorage.removeItem(ck(t,sym)));saveWatch();renderAll()}
function resetWatch(){if(!confirm("Remettre la watchlist propre par défaut ?"))return;watchlist=DEFAULT_WATCHLIST;saveWatch();resetCache(false);renderAll()}
function resetCache(ask=true){if(ask&&!confirm("Vider les données chargées ?"))return;Object.keys(localStorage).filter(k=>k.startsWith("quote_")||k.startsWith("daily_")||k.startsWith("intra_")||k.startsWith("err_")).forEach(k=>localStorage.removeItem(k));renderAll()}

function renderDay(){const day=rankLoaded().filter(x=>["Day trade possible","Zone achat","Surveiller achat","Prendre profit"].includes(x.t.sig));document.getElementById("daytrading").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Mode Day Trading</b><div class="note">RSI 5min, variation jour, support/résistance et ATR. Avec levier, stop court obligatoire.</div></div><div class="card"><b>Règles IA</b><div class="note">Entrée uniquement si signal + marché cohérent. Stop 0.5× à 1× ATR. Prise rapide si +1% à +3% ou résistance proche.</div></div></div><div class="stockGrid ${compact?'compact':''}">${day.map(x=>cardHTML(x.w,x.t)).join("")||`<div class="card">Aucun setup day trading clair.</div>`}</div></div>`}
function renderPortfolio(){const rows=portfolio.map((p,i)=>{const t=technical(p.symbol),cur=t?.c||null,buy=num(p.buy),qty=num(p.qty),pnl=cur&&buy&&qty?(cur-buy)*qty:null,perf=cur&&buy?((cur-buy)/buy*100):null;return`<div class="card"><div class="row"><div><span class="ticker">${p.symbol}</span><div class="name">${p.type} · ${p.lev||"levier ?"}</div></div><div class="price">${cur?fmt(cur):"Non chargé"}<br><span class="${(perf||0)>=0?'green':'red'}">${perf!==null?pct(perf):""}</span></div></div><div class="grid"><div class="metric"><div class="l">Achat</div><div class="v">${p.buy||"-"}</div></div><div class="metric"><div class="l">Qté</div><div class="v">${p.qty||"-"}</div></div><div class="metric"><div class="l">P/L</div><div class="v">${pnl!==null?(pnl>=0?"+":"")+pnl.toFixed(0):"-"}</div></div></div>${t?`<div class="note">Signal actuel : ${t.sig}. ${t.advice}</div>`:`<div class="note">Charge ${p.symbol} dans le scanner pour analyser cette position.</div>`}<button class="secondary" onclick="editPosition(${i})">Modifier</button></div>`}).join("");document.getElementById("portfolio").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Portefeuille</b><div class="note">Complète tes prix d’achat, quantités, leviers, stops et objectifs quand tu veux.</div></div><div class="card"><b>Ajouter position</b><input id="ps" placeholder="Ticker"><select id="pt"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini Future</option><option>Call option</option><option>Put option</option></select><input id="pl" placeholder="Levier"><input id="pb" placeholder="Prix achat"><input id="pq" placeholder="Quantité"><input id="pst" placeholder="Stop"><input id="pta" placeholder="Objectif"><button class="primary" onclick="addPosition()">Ajouter</button></div></div><div class="portfolioGrid">${rows}</div></div>`}
function editPosition(i){const p=portfolio[i];p.buy=prompt("Prix d’achat",p.buy)||p.buy;p.qty=prompt("Quantité",p.qty)||p.qty;p.stop=prompt("Stop loss",p.stop)||p.stop;p.target=prompt("Objectif",p.target)||p.target;p.lev=prompt("Levier",p.lev)||p.lev;savePort();renderPortfolio();renderAlerts()}
function addPosition(){const p={symbol:ps.value.trim().toUpperCase(),type:pt.value,lev:pl.value,buy:pb.value,qty:pq.value,stop:pst.value,target:pta.value};if(!p.symbol)return;portfolio.push(p);savePort();renderPortfolio()}
function renderAlerts(){const arr=[];rankLoaded().forEach(x=>{const t=x.t;if(t.sig!=="Attendre")arr.push(`${x.w.symbol}: ${t.sig} — ${t.advice}`);if(t.rsi&&t.rsi>75)arr.push(`${x.w.symbol}: RSI très élevé, risque de correction.`);if(t.rsi&&t.rsi<30)arr.push(`${x.w.symbol}: RSI survendu, rebond possible mais confirmation nécessaire.`)});portfolio.forEach(p=>{const t=technical(p.symbol);if(!t)return;const stop=num(p.stop),target=num(p.target);if(stop&&t.c<=stop)arr.push(`${p.symbol}: stop touché ou proche.`);if(target&&t.c>=target)arr.push(`${p.symbol}: objectif atteint, envisager prise de profit.`)});const errors=allErrors().map(x=>`${x.w.symbol}: erreur API ignorée (${x.err.msg})`);document.getElementById("alerts").innerHTML=`<div class="card ai"><b>Alertes IA</b><div class="note">Alertes basées sur RSI, SMA, support/résistance, ATR, prix live et portefeuille.</div></div><div class="alertList">${[...arr,...errors].map(a=>`<div class="card">${a}</div>`).join("")||`<div class="card">Aucune alerte forte.</div>`}</div>`}
function show(id,btn){["scanner","daytrading","portfolio","alerts"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(id==="daytrading")renderDay();if(id==="portfolio")renderPortfolio();if(id==="alerts")renderAlerts()}
function renderAll(){renderScanner();renderDay();renderPortfolio();renderAlerts()}
renderAll();
</script>
</body>
</html>
