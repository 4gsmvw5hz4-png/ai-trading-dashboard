.marketRows{display:flex;flex-direction:column;gap:8px;margin-top:10px}.marketRow{display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);padding:7px 0}.marketRow:last-child{border-bottom:0}.marketSym{font-weight:1000}.marketMeta{font-size:11px;color:#9fb0c8;line-height:1.25}.marketScore{font-weight:1000;text-align:right}.regimeBox{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.regimeItem{border-radius:12px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);padding:8px}.regimeItem b{display:block;font-size:10px;color:#9fb0c8}.regimeItem span{font-weight:1000;font-size:12px}
</style>

<body>
<div class="app">
<header class="top">
  <div><div class="small">AI Trading Cockpit V17.1 Hors séance auto</div><div class="title">Trading Scanner</div><div class="small">Scan FMP stable + hors séance automatique sous le prix</div></div>
  <div class="actions"><button class="btn" onclick="toggleCompact()">Vue compacte</button><button class="apiBtn" onclick="setApiKey()">API</button></div>
</header>
<section id="scanner"></section>
<section id="daytrading" class="hidden"></section>
<section id="charts" class="hidden"></section>

<button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('daytrading',this)">Day</button><button onclick="show('opportunities',this)">Top IA</button><button onclick="show('charts',this)">Graph</button><button onclick="show('heatmap',this)">Heat</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('copilot',this)">IA</button><button onclick="show('journal',this)">Journal</button><button onclick="show('alerts',this)">Alertes</button>
</div></nav>
<script>
const DEFAULT_WATCHLIST=[{symbol:"NVDA",label:"Nvidia",sector:"AI / Semi-conducteurs"},{symbol:"AMD",label:"AMD",sector:"Semi-conducteurs"},{symbol:"MU",label:"Micron",sector:"Mémoire / Semi-conducteurs"},{symbol:"QCOM",label:"Qualcomm",sector:"Semi-conducteurs"},{symbol:"AVGO",label:"Broadcom",sector:"AI / Semi-conducteurs"},{symbol:"PLTR",label:"Palantir",sector:"AI Software"},{symbol:"MSFT",label:"Microsoft",sector:"Cloud / AI"},{symbol:"ADBE",label:"Adobe",sector:"Software"},{symbol:"YETI",label:"Yeti",sector:"Consumer"},{symbol:"RACE",label:"Ferrari US ADR",sector:"Luxe / Auto"},{symbol:"STLA",label:"Stellantis",sector:"Auto"},{symbol:"XAG/USD",label:"Silver spot",sector:"Métaux précieux"},{symbol:"QQQ",label:"Nasdaq ETF",sector:"Indice / Tech"},{symbol:"SPY",label:"S&P 500 ETF",sector:"Indice US"},{symbol:"META",label:"Meta",sector:"AI / Social"},{symbol:"AMZN",label:"Amazon",sector:"Cloud / Consumer"},{symbol:"TSLA",label:"Tesla",sector:"EV / Tech"},{symbol:"AAPL",label:"Apple",sector:"Consumer Tech"},{symbol:"GOOGL",label:"Alphabet",sector:"AI / Search"}];

const MARKET_UNIVERSE=["SPY","QQQ","IWM","DIA","TLT","GLD","SLV","NVDA","AMD","AVGO","QCOM","MRVL","MU","SMCI","ARM","TSM","ASML","AMAT","LRCX","INTC","TXN","ON","MCHP","ADI","KLAC","MSFT","AAPL","GOOGL","META","AMZN","NFLX","TSLA","PLTR","SNOW","CRM","NOW","ADBE","ORCL","IBM","PANW","CRWD","DDOG","MDB","NET","SHOP","UBER","ABNB","COIN","HOOD","SQ","PYPL","V","MA","JPM","BAC","GS","MS","C","XOM","CVX","OXY","COP","NKE","LULU","COST","WMT","TGT","HD","LOW","SBUX","MCD","RACE","STLA","F","GM","LLY","NVO","UNH","PFE","MRNA","ISRG","TMO","VEEV","CIEN","YETI"];
const MARKET_LABELS={SPY:"S&P 500",QQQ:"Nasdaq",IWM:"Russell 2000",DIA:"Dow Jones",TLT:"Bonds US 20Y",GLD:"Or",SLV:"Argent",AVGO:"Broadcom",MRVL:"Marvell",NVDA:"Nvidia",AMD:"AMD",QCOM:"Qualcomm",MU:"Micron",SMCI:"Super Micro",ARM:"ARM",TSM:"TSMC",ASML:"ASML",MSFT:"Microsoft",GOOGL:"Alphabet",META:"Meta",AMZN:"Amazon",NFLX:"Netflix",TSLA:"Tesla",PLTR:"Palantir",SNOW:"Snowflake",CRM:"Salesforce",NOW:"ServiceNow",ADBE:"Adobe",VEEV:"Veeva",CIEN:"Ciena",RACE:"Ferrari",YETI:"Yeti"};
const DEFAULT_PORTFOLIO=[{symbol:"YETI",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"QCOM",type:"Mini future",lev:"",buy:"",qty:"",target:"",stop:""},{symbol:"ADBE",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"MSFT",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"XAG/USD",type:"Silver / Future",lev:"",buy:"",qty:"",target:"",stop:""},{symbol:"RACE",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"STLA",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""}];
let watchlist=JSON.parse(localStorage.getItem("watchlist_v6")||"null")||DEFAULT_WATCHLIST;
let portfolio=JSON.parse(localStorage.getItem("portfolio_v6")||"null")||DEFAULT_PORTFOLIO;
let compact=localStorage.getItem("compact_v6")==="1", currentFilter="all", searchQuery=localStorage.getItem("search_v13")||"", selectedChart=localStorage.getItem("selectedChart_v6")||"NVDA";
let scanState={active:false,done:0,total:0,label:""};let marketScanReady=localStorage.getItem("marketScanReady_v17")==="1";let APP_VERSION="v17_1_auto_extended";if(localStorage.getItem("app_version")!==APP_VERSION){Object.keys(localStorage).filter(k=>k.startsWith("err_")).forEach(k=>localStorage.removeItem(k));localStorage.setItem("app_version",APP_VERSION)}
function saveWatch(){localStorage.setItem("watchlist_v6",JSON.stringify(watchlist))}function savePort(){localStorage.setItem("portfolio_v6",JSON.stringify(portfolio))}
function fmpKey(){return localStorage.getItem("FMP_API_KEY")||localStorage.getItem("TWELVE_API_KEY")||""}
function apiKey(){return localStorage.getItem("TWELVE_API_KEY")||""}
function setApiKey(){
 const f=prompt("Colle ta clé Financial Modeling Prep (FMP) pour le scan rapide :",fmpKey());
 if(f!==null)localStorage.setItem("FMP_API_KEY",f.trim());
 const t=prompt("Optionnel : colle ta clé Twelve Data pour les analyses détaillées RSI/MACD/ATR. Laisse vide si tu veux utiliser seulement FMP rapide :",apiKey());
 if(t!==null)localStorage.setItem("TWELVE_API_KEY",t.trim());
 alert("Clés enregistrées. Le scan global utilise FMP; Twelve Data ne sert plus qu'aux analyses détaillées.");
}
function toggleCompact(){compact=!compact;localStorage.setItem("compact_v6",compact?"1":"0");renderAll()}
function ck(t,s){return t+"_"+s.replaceAll("/","_")}function getC(t,s){try{return JSON.parse(localStorage.getItem(ck(t,s))||"null")}catch(e){return null}}function setC(t,s,d){localStorage.setItem(ck(t,s),JSON.stringify({time:Date.now(),data:d}))}
function setErr(s,m){localStorage.setItem(ck("err",s),JSON.stringify({time:Date.now(),msg:m}))}function getErr(s){try{return JSON.parse(localStorage.getItem(ck("err",s))||"null")}catch(e){return null}}function clearErr(s){localStorage.removeItem(ck("err",s))}
function fresh(c,min){return c&&Date.now()-c.time<min*60*1000}function num(x){const n=Number(x);return isFinite(n)?n:null}function fmt(n){return n===null||n===undefined||isNaN(n)?"-":"$"+Number(n).toFixed(2)}function pct(v){const n=num(v);if(n===null)return"-";return(n>=0?"+":"")+n.toFixed(2)+"%"}function cls(n){return(num(n)||0)>=0?"green":"red"}
function lastUpdate(s){const c=getC("quote",s);if(!c)return"-";return new Date(c.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}function dataAge(s){const c=getC("quote",s);if(!c)return"";const sec=Math.round((Date.now()-c.time)/1000);return sec<60?sec+" sec":Math.round(sec/60)+" min"}
function tvSymbol(sym){if(sym==="XAG/USD")return"TVC:SILVER";if(sym==="RACE")return"NYSE:RACE";if(sym==="STLA")return"NYSE:STLA";return"NASDAQ:"+sym}
async function td(path,params){const key=apiKey();if(!key)throw new Error("Ajoute ta clé Twelve Data via API.");const qs=new URLSearchParams({...params,apikey:key});const r=await fetch(`https://api.twelvedata.com/${path}?${qs.toString()}`);const j=await r.json();if(j.status==="error"||j.code||j.message)throw new Error(j.message||"Erreur API");return j}

async function fmpFetch(path){
 const key=fmpKey();
 if(!key)throw new Error("Ajoute ta clé FMP via le bouton API.");
 const sep=path.includes("?")?"&":"?";
 const r=await fetch(`https://financialmodelingprep.com${path}${sep}apikey=${encodeURIComponent(key)}`);
 const txt=await r.text();
 let j;
 try{j=JSON.parse(txt)}catch(e){throw new Error(`FMP a répondu: ${txt.slice(0,140)}`)}
 if(j && !Array.isArray(j) && (j.Error || j.error || j.message))throw new Error(j.Error||j.error||j.message);
 return j;
}
function isFmpSupported(sym){return !sym.includes("/")}
function normalizeFmpQuote(x){
 const regular=num(x.price);
 return {symbol:x.symbol,name:x.name||x.symbol,regular_close:regular,close:regular,percent_change:num(x.changesPercentage),change:num(x.change),high:num(x.dayHigh),low:num(x.dayLow),open:num(x.open),previous_close:num(x.previousClose),volume:num(x.volume),priceAvg50:num(x.priceAvg50),priceAvg200:num(x.priceAvg200),marketCap:num(x.marketCap),source:"FMP"};
}
function mergeExtendedQuote(q,ext){
 if(!q||!ext||!ext.price)return q;
 const base=num(q.regular_close)||num(q.close)||num(q.previous_close);
 const prev=num(q.previous_close)||base;
 const px=num(ext.price);

 if(s50&&c>s50)score+=10; else score-=6;
 if(s20&&s50&&s20>s50)score+=8;
 if(r!==null){ if(r>55&&r<70)score+=8; if(r<35)score+=6; if(r>75)score-=12; }
 if(m&&m>0)score+=6;
 return Math.max(0,Math.min(100,Math.round(score)));
}
function multiTF(sym){
 const d=values(getC("daily",sym)?.data), h=values(getC("hourly",sym)?.data), m5=values(getC("intra",sym)?.data);
 const sd=timeframeScoreFromArr(d), sh=timeframeScoreFromArr(h), sm=timeframeScoreFromArr(m5);
 const arr=[sd,sh,sm].filter(x=>x!==null);
 const avg=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
 let label="Incomplet";
 if(avg!==null){ if(sd>60&&sh>60&&sm>60)label="Alignement haussier"; else if(sd<45&&sh<45&&sm<45)label="Alignement baissier"; else if(sd>60&&sh<50)label="Daily positif mais intraday faible"; else if(sd<50&&sm>60)label="Rebond court terme contre tendance"; else label="Mixte"; }
 return {daily:sd,hourly:sh,m5:sm,avg,label};
}
function detectSetups(sym,t){
 const setups=[];
 const mt=multiTF(sym);
 if(t.sig==="Breakout")setups.push("Breakout");
 if(t.sig==="Day trade possible")setups.push("Day trade");
 if(t.distSup!==null&&t.distSup<3)setups.push("Proche support");
 if(t.distRes!==null&&t.distRes<3)setups.push("Proche résistance");
 if(t.rsi&&t.rsi<35)setups.push("Survente daily");
 if(t.rsi&&t.rsi>70)setups.push("Surachat daily");
 if(t.rsi5&&t.rsi5<35)setups.push("Rebond intraday");
 if(t.vol&&t.vol.includes("fort"))setups.push("Volume fort");
 if(mt.label==="Alignement haussier")setups.push("Multi-timeframe haussier");
 if(mt.label==="Daily positif mais intraday faible")setups.push("Pullback potentiel");
 return setups.length?setups:["Aucun setup fort"];
}
function opportunityScore(x){
 const t=x.t, mt=multiTF(x.w.symbol);
 let s=t.score*0.45+t.dayScore*0.35+(mt.avg||50)*0.20;
 if(["Breakout","Zone achat","Day trade possible"].includes(t.sig))s+=8;
 if(t.sig==="Prendre profit")s-=10;
 return Math.round(Math.max(0,Math.min(100,s)));
}


function probabilityLabel(score){
 if(score>=80)return["Très forte","green"];
 if(score>=70)return["Forte","green"];
 if(score>=60)return["Correcte","amber"];

}
function nextAction(sym,t){

 if(mt.label==="Daily positif mais intraday faible")return"Attendre fin de pullback : intéressant seulement si le 5 min/1h se retourne.";
 if(mt.label==="Rebond court terme contre tendance")return"Rebond possible mais fragile. Trade court uniquement.";
 return"Attendre. Pas d’avantage clair.";
}
function setupQuality(sym,t){
 const mt=multiTF(sym), setups=detectSetups(sym,t);
 let p=opportunityScore({w:{symbol:sym},t});
 if(t.risk&&t.risk[0]==="Élevé")p-=8;
 p=Math.max(0,Math.min(100,Math.round(p)));
 return {prob:p,label:probabilityLabel(p),mt,setups,action:nextAction(sym,t)};
}

 return risk+" "+a.join(" · ");
}

 <div class="graphAICard"><h3>Multi-timeframe</h3><div class="tfBox"><div class="tf"><b>Daily</b>${mt.daily??"-"}/100</div><div class="tf"><b>1 heure</b>${mt.hourly??"-"}/100</div><div class="tf"><b>5 minutes</b>${mt.m5??"-"}/100</div></div><div class="note"><b>${mt.label}</b><br>${setups.map(s=>`<span class="pill">${s}</span>`).join("")}</div></div><div class="graphAICard"><h3>Ce que l’IA voit</h3><div class="note">${trendTxt}<br><br>${positionTxt}<br><br>${rsiTxt}<br>${dayTxt}</div></div>
  <div class="graphAICard"><h3>Niveaux clés</h3><div class="levels"><div class="level"><b>Support</b>${fmt(sup)}</div><div class="level"><b>Résistance</b>${fmt(res)}</div><div class="level"><b>ATR</b>${fmt(atr)}</div></div><div class="note">Le support est la zone où les acheteurs peuvent revenir. La résistance est la zone où les vendeurs peuvent bloquer la hausse.</div></div>
  <div class="graphAICard"><h3>Scénario achat</h3><div class="note">Entrée idéale sur repli : ${rangeFmt(levels.pullLow,levels.pullHigh)}. Achat momentum uniquement sur cassure : ${rangeFmt(levels.momLow,levels.momHigh)} avec volume.</div></div>
  <div class="graphAICard"><h3>Scénario sortie / danger</h3><div class="note">Si le prix casse sous ${fmt(levels.stop)}, le setup est invalidé. Objectifs indicatifs : ${fmt(levels.target1)} puis ${fmt(levels.target2)}.</div></div>
  <div class="graphAICard"><h3>Plan simple</h3><div class="note">${t.plan}<br>Risk/reward indicatif : ${rr?rr.toFixed(2):"-"}.</div></div>
 </div>`;
}
function renderCharts(){
 const buttons=watchlist.map(w=>`<button class="secondary" onclick="selectChart('${w.symbol}')">${w.symbol}</button>`).join("");
 document.getElementById("charts").innerHTML=`<div class="card ai"><b>Graphique + lecture IA</b><div class="note">L’IA traduit le graphique en langage simple : tendance, support, résistance, achat, sortie, stop et objectif.</div></div><div class="chartControls">${buttons}</div><div id="chartAI">${chartReadingHTML(selectedChart)}</div><div class="chartWrap" id="tvchart"></div>`;
 loadTradingView(selectedChart);
}
function selectChart(s){selectedChart=s;localStorage.setItem("selectedChart_v6",s);loadTradingView(s)}function openChart(s){selectedChart=s;localStorage.setItem("selectedChart_v6",s);document.querySelectorAll(".nav button")[2].click()}
function loadTradingView(sym){const box=document.getElementById("tvchart");if(!box)return;box.innerHTML="";const s=document.createElement("script");s.src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";s.async=true;s.innerHTML=JSON.stringify({autosize:true,symbol:tvSymbol(sym),interval:"15",timezone:"Europe/Zurich",theme:"dark",style:"1",locale:"fr",enable_publishing:false,allow_symbol_change:true,studies:["RSI@tv-basicstudies","MASimple@tv-basicstudies","MACD@tv-basicstudies"],support_host:"https://www.tradingview.com"});box.appendChild(s)}

function portfolioSummary(){
 let total=0,pnl=0,has=0,risk=0;
 portfolio.forEach(p=>{const t=technical(p.symbol),cur=t?.c,buy=num(p.buy),qty=num(p.qty);if(cur&&buy&&qty){total+=cur*qty;pnl+=(cur-buy)*qty;has++; const stop=num(p.stop); if(stop)risk+=Math.max(0,(cur-stop)*qty)}})
 if(!has)return"Complète tes PRU et quantités pour obtenir le P/L global.";
 return `Valeur suivie: ${fmt(total)} · P/L estimé: ${(pnl>=0?"+":"")+pnl.toFixed(0)} · Risque jusqu’aux stops: ${risk?fmt(risk):"-"}.`;
}
function positionAdvice(p,t){
 const cur=t.c, stop=num(p.stop), target=num(p.target), buy=num(p.buy);
 if(stop&&cur<=stop)return"Stop touché/proche : protéger le capital.";
 if(target&&cur>=target)return"Objectif atteint : prendre profit ou relever stop.";
 if(buy&&cur>buy*1.1)return"+10% atteint : envisager prise partielle.";
 if(t.sig==="Prendre profit")return"Signal IA de prise de profit.";
 if(["Zone achat","Surveiller achat","Breakout"].includes(t.sig))return"Position techniquement constructive, garder avec stop.";
 return"Conserver seulement si ton plan initial reste valide.";
}
function renderPortfolio(){
 const rows=portfolio.map((p,i)=>{const t=technical(p.symbol),cur=t?.c||null,buy=num(p.buy),qty=num(p.qty),pnl=cur&&buy&&qty?(cur-buy)*qty:null,perf=cur&&buy?((cur-buy)/buy*100):null,value=cur&&qty?cur*qty:null;return`<div class="card"><div class="row"><div><span class="ticker">${p.symbol}</span><div class="name">${p.type} · ${p.lev||"levier ?"}</div></div><div class="price">${cur?fmt(cur):"Non chargé"}<br><span class="${(perf||0)>=0?'green':'red'}">${perf!==null?pct(perf):""}</span></div></div><div class="grid"><div class="metric"><div class="l">PRU</div><div class="v">${p.buy||"-"}</div></div><div class="metric"><div class="l">Qté</div><div class="v">${p.qty||"-"}</div></div><div class="metric"><div class="l">P/L</div><div class="v">${pnl!==null?(pnl>=0?"+":"")+pnl.toFixed(0):"-"}</div></div></div><div class="grid extra"><div class="metric"><div class="l">Valeur</div><div class="v">${value?fmt(value):"-"}</div></div><div class="metric"><div class="l">Stop</div><div class="v">${p.stop||"-"}</div></div><div class="metric"><div class="l">Objectif</div><div class="v">${p.target||"-"}</div></div></div>${t?`<div class="note"><b>IA position:</b> ${positionAdvice(p,t)}<br>${t.plan}</div>`:`<div class="note">Charge ${p.symbol} dans le scanner pour analyser cette position.</div>`}<button class="secondary" onclick="editPosition(${i})">Modifier</button><button class="danger" onclick="removePosition(${i})">Supprimer</button></div>`}).join("");
 document.getElementById("portfolio").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Portefeuille avancé</b><div class="note">${portfolioSummary()}</div></div><div class="card"><b>Calculateur risque</b><input id="capital" placeholder="Capital ex: 10000"><input id="riskpct" placeholder="Risque max % ex: 1"><input id="entryrisk" placeholder="Prix entrée"><input id="stoprisk" placeholder="Stop"><button class="primary" onclick="calcRisk()">Calculer taille</button><div id="riskResult" class="note"></div></div><div class="card"><b>Ajouter position</b><input id="ps" placeholder="Ticker"><select id="pt"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini Future</option><option>Call option</option><option>Put option</option></select><input id="pl" placeholder="Levier"><input id="pb" placeholder="Prix achat / PRU"><input id="pq" placeholder="Quantité"><input id="pst" placeholder="Stop"><input id="pta" placeholder="Objectif"><button class="primary" onclick="addPosition()">Ajouter</button></div></div><div class="portfolioGrid">${rows}</div></div>`;
}

function calcRisk(){
 const cap=num(capital.value), rp=num(riskpct.value), entry=num(entryrisk.value), stop=num(stoprisk.value);
 if(!cap||!rp||!entry||!stop)return riskResult.innerHTML="Remplis capital, risque %, entrée et stop.";
 const maxLoss=cap*rp/100;
 const perShare=Math.abs(entry-stop);
 const qty=Math.floor(maxLoss/perShare);
 riskResult.innerHTML=`Perte max: ${fmt(maxLoss)}<br>Risque par action: ${fmt(perShare)}<br>Taille indicative: ${qty} titres/contracts.`;
}
function editPosition(i){const p=portfolio[i];p.buy=prompt("Prix d’achat / PRU",p.buy)||p.buy;p.qty=prompt("Quantité",p.qty)||p.qty;p.stop=prompt("Stop loss",p.stop)||p.stop;p.target=prompt("Objectif",p.target)||p.target;p.lev=prompt("Levier",p.lev)||p.lev;savePort();renderPortfolio();renderAlerts()}
function removePosition(i){if(!confirm("Supprimer cette position ?"))return;portfolio.splice(i,1);savePort();renderPortfolio();renderAlerts()}
function addPosition(){const p={symbol:ps.value.trim().toUpperCase(),type:pt.value,lev:pl.value,buy:pb.value,qty:pq.value,stop:pst.value,target:pta.value};if(!p.symbol)return;portfolio.push(p);savePort();renderPortfolio()}

function renderAlerts(){const arr=[];rankLoaded().forEach(x=>{const t=x.t;if(t.sig!=="Attendre"){const q=setupQuality(x.w.symbol,t);arr.push(`${x.w.symbol}: ${t.sig} — Probabilité IA ${q.prob}/100 — ${q.action}`)}if(t.dayScore>=75)arr.push(`${x.w.symbol}: score day trading élevé (${t.dayScore}/100).`)});document.getElementById("alerts").innerHTML=`<div class="card ai"><b>Alertes IA</b><div class="note">Alertes basées sur prix refreshés, RSI, supports/résistances, ATR.</div></div><div class="alertList">${arr.map(a=>`<div class="card">${a}</div>`).join("")||`<div class="card">Aucune alerte forte.</div>`}</div>`}



function renderOpportunities(){
 const list=rankLoaded().map(x=>({...x,opp:opportunityScore(x),mt:multiTF(x.w.symbol),setups:detectSetups(x.w.symbol,x.t),quality:setupQuality(x.w.symbol,x.t)})).sort((a,b)=>b.opp-a.opp);
 const block=(title,arr,desc)=>`<div class="card"><b>${title}</b><div class="note">${desc}</div><div class="opportunityGrid" style="margin-top:10px">${arr.map(x=>{const p=tradingLevels(x.t);return`<div class="graphAICard"><div class="row"><div><span class="ticker">${x.w.symbol}</span><div class="name">${x.t.sig}</div></div><div class="price">${p.conv}/10<br><span class="${x.quality.label[1]}">${x.quality.label[0]}</span></div></div>${planMiniHTML(x.t)}<div class="tfBox"><div class="tf"><b>Daily</b>${x.mt.daily??"-"}</div><div class="tf"><b>1h</b>${x.mt.hourly??"-"}</div><div class="tf"><b>5m</b>${x.mt.m5??"-"}</div></div><div class="note"><b>Agent:</b> ${x.quality.action}<br>${x.setups.map(s=>`<span class="pill">${s}</span>`).join("")}</div></div>`}).join("")||"<div class='note'>Aucune opportunité claire.</div>"}</div></div>`;
 const topDay=list.filter(x=>x.t.dayScore>=60).slice(0,6);
 const topSwing=list.filter(x=>x.t.score>=60).slice(0,6);
 const rebound=list.filter(x=>x.setups.includes("Proche support")||x.setups.includes("Rebond intraday")||x.setups.includes("Pullback potentiel")).slice(0,6);
 const momentum=list.filter(x=>x.mt.label==="Alignement haussier"||x.setups.includes("Breakout")||x.setups.includes("Volume fort")).slice(0,6);
 document.getElementById("opportunities").innerHTML=`<div class="card ai"><b>Top IA — Scanner opportunités</b><div class="note">${marketRegime()}<br>Cette page est l’endroit principal pour voir les comparaisons 5m / 1h / daily, les pullbacks, rebonds et setups détectés.</div></div>${block("Top global IA",list.slice(0,8),"Meilleures opportunités globales selon swing + day + multi-timeframe.")}${block("Top day trading",topDay,"Priorité au 5 minutes, momentum intraday et timing court terme.")}${block("Top swing",topSwing,"Priorité au daily et à la tendance de fond.")}${block("Rebond / Pullback",rebound,"Actions proches support ou en repli dans une tendance encore constructive.")}${block("Momentum / Cassure",momentum,"Actions avec tendance alignée, breakout ou volume fort.")}`;
}
function renderHeatmap(){
 const list=rankLoaded();
 const tiles=list.map(x=>{const ch=x.t.day||0;return`<div class="tile ${ch>0?'tilePos':ch<0?'tileNeg':'tileNeu'}"><div class="sym">${x.w.symbol}</div><div class="chg ${cls(ch)}">${pct(ch)}</div><div class="kv">${x.t.sig}</div><div class="kv">Swing ${x.t.score} · Day ${x.t.dayScore}</div></div>`}).join("");
 const sectors={};
 list.forEach(x=>{const sec=x.w.sector||"Autre"; if(!sectors[sec])sectors[sec]=[]; sectors[sec].push(x.t.day||0)});
 const secRows=Object.entries(sectors).map(([k,v])=>`<tr><td>${k}</td><td>${pct(v.reduce((a,b)=>a+b,0)/v.length)}</td><td>${v.length}</td></tr>`).join("");
 document.getElementById("heatmap").innerHTML=`<div class="card ai"><b>Heatmap marché</b><div class="note">Vue rapide des forces/faiblesses par action et par secteur chargé.</div></div><div class="heatmap">${tiles||"<div class='card'>Charge des actions pour afficher la heatmap.</div>"}</div><div class="card" style="margin-top:12px"><b>Force par secteur</b><table class="table"><tr><th>Secteur</th><th>Moy. jour</th><th>Nb</th></tr>${secRows}</table></div>`;
}
function copilotText(){
 const list=rankLoaded();
 if(!list.length)return"Charge quelques actions dans le scanner puis reviens ici.";
 const top=list[0], day=list.find(x=>x.t.dayScore>=68), sell=list.find(x=>x.t.sig==="Prendre profit"), buy=list.find(x=>["Zone achat","Breakout","Surveiller achat"].includes(x.t.sig));
 let txt=`Synthèse IA\n\n`;
 txt+=`Meilleur score global : ${top.w.symbol} (${top.t.score}/100 swing, ${top.t.dayScore}/100 day). Multi-timeframe: ${multiTF(top.w.symbol).label}.\n`;
 if(day)txt+=`Meilleur setup day trading : ${day.w.symbol}. Multi-timeframe: ${multiTF(day.w.symbol).label}. Plan : ${day.t.plan}\n`;
 if(buy){const p=tradingLevels(buy.t);txt+=`Setup achat/cassure à surveiller : ${buy.w.symbol} — ${buy.t.sig}. Entrée idéale ${rangeFmt(p.pullLow,p.pullHigh)}, cassure ${rangeFmt(p.momLow,p.momHigh)}, stop ${fmt(p.stop)}, objectifs ${fmt(p.target1)} / ${fmt(p.target2)}, conviction ${p.conv}/10.\n`;}
 if(sell)txt+=`Action tendue / prise de profit : ${sell.w.symbol}. Plan : ${sell.t.plan}\n`;
 txt+=`\nRègle de prudence : ne pas entrer si le prix live de l’app ne correspond pas au graphique TradingView/Investing. Avec levier, réduire la taille et utiliser un stop.`;
 return txt;
}
function renderCopilot(){
 const options=rankLoaded().map(x=>`<option value="${x.w.symbol}">${x.w.symbol}</option>`).join("");
 document.getElementById("copilot").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>IA Copilot</b><div class="note">Résumé automatique basé sur les données chargées, les scores, supports/résistances, ATR et signaux.</div></div><div class="card"><b>Analyser une action</b><select id="copilotSym">${options}</select><button class="primary" onclick="analyzeOne()">Analyser</button><div id="oneAnalysis" class="note"></div></div></div><div class="card"><div class="copilotBox">${copilotText()}</div></div></div>`;
}
function analyzeOne(){
 const s=document.getElementById("copilotSym").value, t=technical(s);
 if(!t)return;
 document.getElementById("oneAnalysis").innerHTML=`<b>${s}</b><br>Signal: ${t.sig}<br>${planMiniHTML(t)}<br>Prix: ${fmt(t.c)} · High: ${fmt(num(t.q.high))} · Low: ${fmt(num(t.q.low))}<br>Risque: ${t.risk[0]}`;
}
function journal(){return JSON.parse(localStorage.getItem("trade_journal_v7")||"[]")}
function saveJournal(j){localStorage.setItem("trade_journal_v7",JSON.stringify(j))}

function journalCoach(){
 const j=journal();
 if(!j.length)return "Coach IA : ajoute quelques trades pour obtenir une analyse de tes habitudes.";
 const wins=j.filter(x=>(x.result||"").includes("+")).length;
 const losses=j.filter(x=>(x.result||"").includes("-")).length;
 let txt=`Trades notés : ${j.length}. Gagnants détectés : ${wins}. Perdants détectés : ${losses}.\n`;
 if(losses>wins)txt+="Point à travailler : réduire les pertes rapidement et respecter les stops.\n";
 if(wins>losses)txt+="Point positif : plus de trades gagnants que perdants, pense à laisser courir les meilleurs setups.\n";
 txt+="Rappel : note toujours pourquoi tu entres, sinon impossible de progresser.";
 return txt;
}
function renderJournal(){
 const j=journal();
 const rows=j.map((x,i)=>`<div class="card"><b>${x.sym}</b> · ${x.side}<div class="note">${x.date}<br>Entrée: ${x.entry} · Sortie: ${x.exit||"-"} · Résultat: ${x.result||"-"}<br>${x.reason||""}</div><button class="danger" onclick="delTrade(${i})">Supprimer</button></div>`).join("");
 document.getElementById("journal").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Journal de trading</b><div class="note">Note tes trades pour identifier ce qui marche vraiment.</div><div class="coach">${journalCoach()}</div></div><div class="card"><input id="jsym" placeholder="Ticker"><select id="jside"><option>Achat</option><option>Vente</option><option>Short</option><option>Option Call</option><option>Option Put</option></select><input id="jentry" placeholder="Prix entrée"><input id="jexit" placeholder="Prix sortie"><input id="jresult" placeholder="Résultat CHF/%"><input id="jreason" placeholder="Pourquoi ce trade ?"><button class="primary" onclick="addTrade()">Ajouter trade</button></div></div><div class="journalGrid">${rows||"<div class='card'>Aucun trade enregistré.</div>"}</div></div>`;
}
function addTrade(){const j=journal();j.unshift({date:new Date().toLocaleString("fr-FR"),sym:jsym.value.toUpperCase(),side:jside.value,entry:jentry.value,exit:jexit.value,result:jresult.value,reason:jreason.value});saveJournal(j);renderJournal()}
function delTrade(i){const j=journal();j.splice(i,1);saveJournal(j);renderJournal()}

function show(id,btn){["scanner","daytrading","opportunities","charts","heatmap","portfolio","copilot","journal","alerts"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(id==="daytrading")renderDay();if(id==="charts")renderCharts();if(id==="opportunities")renderOpportunities();if(id==="heatmap")renderHeatmap();if(id==="portfolio")renderPortfolio();if(id==="copilot")renderCopilot();if(id==="journal")renderJournal();if(id==="alerts")renderAlerts()}
function renderAll(){renderScanner();renderDay();renderOpportunities();renderCharts();renderHeatmap();renderPortfolio();renderCopilot();renderJournal();renderAlerts()}renderAll();
</script>
