<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Trading Cockpit V7</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#05070a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{width:100%;max-width:1580px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#111827,#05070a);padding:18px 18px 96px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.small{font-size:12px;color:#93a4bd}.title{font-size:26px;font-weight:900;letter-spacing:-.8px}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn,.apiBtn{border:1px solid rgba(255,255,255,.25);background:#1d2738;border-radius:15px;color:#fff;padding:10px 12px;font-weight:900;cursor:pointer}
.card{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.ai{background:linear-gradient(135deg,rgba(31,111,235,.30),rgba(16,185,129,.18));border-color:rgba(83,163,255,.25)}
.layout{display:grid;grid-template-columns:370px 1fr;gap:14px;align-items:start}
.side{display:flex;flex-direction:column;gap:13px;position:sticky;top:14px}
.stockGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.portfolioGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.ticker{font-size:22px;font-weight:900;letter-spacing:-.5px}.name{font-size:12px;color:#9fb0c8;margin-top:2px;line-height:1.25}
.price{text-align:right;font-weight:900;font-size:16px;min-width:76px}
.green{color:#34d399}.red{color:#fb7185}.amber{color:#fbbf24}.blue{color:#60a5fa}.muted{color:#9fb0c8}
.badge{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);font-weight:900;white-space:nowrap}
.buy{color:#34d399;background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.3)}
.sell{color:#fb7185;background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.3)}
.watch{color:#60a5fa;background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3)}
.daytrade{color:#fbbf24;background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3)}
.breakout{color:#c084fc;background:rgba(192,132,252,.13);border-color:rgba(192,132,252,.3)}
.wait{color:#cbd5e1}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:8px}
.metric{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:9px}
.metric .l{font-size:10px;color:#9fb0c8}.metric .v{font-weight:900;font-size:12px;margin-top:3px;word-break:break-word}
.note{font-size:12px;line-height:1.35;color:#dbeafe;margin-top:10px}.warn{font-size:12px;line-height:1.35;color:#fbbf24;margin-top:8px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.84);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);z-index:10}
.navin{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(8,1fr);gap:8px;padding:10px}
.nav button{border:0;border-radius:17px;padding:12px 6px;background:transparent;color:#9fb0c8;font-weight:900;cursor:pointer}.nav button.active{background:white;color:#05070a}
.hidden{display:none!important}
input,select{width:100%;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.23);color:#fff;border-radius:14px;padding:12px;margin:5px 0 9px}
button.primary{width:100%;border:0;border-radius:17px;background:white;color:#05070a;padding:13px;font-weight:900;margin-top:8px;cursor:pointer}
button.secondary{width:100%;border:1px solid rgba(255,255,255,.18);border-radius:17px;background:rgba(255,255,255,.07);color:#fff;padding:12px;font-weight:900;margin-top:8px;cursor:pointer}
button.danger{width:100%;border:1px solid rgba(251,113,133,.35);border-radius:17px;background:rgba(251,113,133,.12);color:#fb7185;padding:12px;font-weight:900;margin-top:8px;cursor:pointer}
hr{border:0;border-top:1px solid rgba(255,255,255,.1);margin:13px 0}.kv{font-size:12px;color:#9fb0c8;line-height:1.35}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,#fb7185,#fbbf24,#34d399);width:50%}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar button{flex:1;min-width:120px}
.compact .extra{display:none}
.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid rgba(255,255,255,.08);padding:10px 8px;text-align:left}.table th{color:#9fb0c8;font-size:11px;text-transform:uppercase}
.alertList{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.chip{display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.22);border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}
.chip button{border:0;background:rgba(251,113,133,.18);color:#fb7185;border-radius:999px;width:19px;height:19px;cursor:pointer;font-weight:900}
.filterbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.filterbar button{width:auto;margin:0;padding:9px 12px;border-radius:999px}
.chartWrap{height:520px;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:#0b1220}
.chartControls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chartControls button{width:auto;margin:0;padding:9px 12px;border-radius:999px}
@media (max-width:800px){.app{max-width:450px;padding:18px 14px 96px}.layout{display:block}.side{position:static;margin-bottom:13px}.stockGrid,.portfolioGrid,.alertList{grid-template-columns:1fr}.title{font-size:25px}.chartWrap{height:460px}.navin{grid-template-columns:repeat(8,1fr);gap:4px}.nav button{font-size:11px;padding:10px 2px}}

.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.tile{border-radius:18px;padding:13px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06)}
.tile .sym{font-size:18px;font-weight:1000}.tile .chg{font-size:15px;font-weight:900;margin-top:5px}
.tilePos{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.25)}
.tileNeg{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.25)}
.tileNeu{background:rgba(255,255,255,.06)}
.copilotBox{white-space:pre-wrap;font-size:13px;line-height:1.45;color:#dbeafe}
.journalGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

</style>
</head>
<body>
<div class="app">
<header class="top">
  <div><div class="small">AI Trading Cockpit V7</div><div class="title">Trading Scanner</div></div>
  <div class="actions"><button class="btn" onclick="toggleCompact()">Vue compacte</button><button class="apiBtn" onclick="setApiKey()">API</button></div>
</header>
<section id="scanner"></section>
<section id="daytrading" class="hidden"></section>
<section id="charts" class="hidden"></section>
<section id="heatmap" class="hidden"></section>
<section id="portfolio" class="hidden"></section>
<section id="copilot" class="hidden"></section>
<section id="journal" class="hidden"></section>
<section id="alerts" class="hidden"></section>
</div>
<nav class="nav"><div class="navin">
<button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('daytrading',this)">Day</button><button onclick="show('charts',this)">Graph</button><button onclick="show('heatmap',this)">Heat</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('copilot',this)">IA</button><button onclick="show('journal',this)">Journal</button><button onclick="show('alerts',this)">Alertes</button>
</div></nav>
<script>
const DEFAULT_WATCHLIST=[{symbol:"NVDA",label:"Nvidia",sector:"AI / Semi-conducteurs"},{symbol:"AMD",label:"AMD",sector:"Semi-conducteurs"},{symbol:"MU",label:"Micron",sector:"Mémoire / Semi-conducteurs"},{symbol:"QCOM",label:"Qualcomm",sector:"Semi-conducteurs"},{symbol:"AVGO",label:"Broadcom",sector:"AI / Semi-conducteurs"},{symbol:"PLTR",label:"Palantir",sector:"AI Software"},{symbol:"MSFT",label:"Microsoft",sector:"Cloud / AI"},{symbol:"ADBE",label:"Adobe",sector:"Software"},{symbol:"YETI",label:"Yeti",sector:"Consumer"},{symbol:"RACE",label:"Ferrari US ADR",sector:"Luxe / Auto"},{symbol:"STLA",label:"Stellantis",sector:"Auto"},{symbol:"XAG/USD",label:"Silver spot",sector:"Métaux précieux"},{symbol:"QQQ",label:"Nasdaq ETF",sector:"Indice / Tech"},{symbol:"SPY",label:"S&P 500 ETF",sector:"Indice US"},{symbol:"META",label:"Meta",sector:"AI / Social"},{symbol:"AMZN",label:"Amazon",sector:"Cloud / Consumer"},{symbol:"TSLA",label:"Tesla",sector:"EV / Tech"},{symbol:"AAPL",label:"Apple",sector:"Consumer Tech"},{symbol:"GOOGL",label:"Alphabet",sector:"AI / Search"}];
const DEFAULT_PORTFOLIO=[{symbol:"YETI",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"QCOM",type:"Mini future",lev:"",buy:"",qty:"",target:"",stop:""},{symbol:"ADBE",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"MSFT",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"XAG/USD",type:"Silver / Future",lev:"",buy:"",qty:"",target:"",stop:""},{symbol:"RACE",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""},{symbol:"STLA",type:"Action",lev:"x1",buy:"",qty:"",target:"",stop:""}];
let watchlist=JSON.parse(localStorage.getItem("watchlist_v6")||"null")||DEFAULT_WATCHLIST;
let portfolio=JSON.parse(localStorage.getItem("portfolio_v6")||"null")||DEFAULT_PORTFOLIO;
let compact=localStorage.getItem("compact_v6")==="1", currentFilter="all", selectedChart=localStorage.getItem("selectedChart_v6")||"NVDA";
function saveWatch(){localStorage.setItem("watchlist_v6",JSON.stringify(watchlist))}function savePort(){localStorage.setItem("portfolio_v6",JSON.stringify(portfolio))}
function apiKey(){return localStorage.getItem("TWELVE_API_KEY")||""}function setApiKey(){const k=prompt("Colle ta clé API Twelve Data :",apiKey());if(k!==null){localStorage.setItem("TWELVE_API_KEY",k.trim());alert("Clé enregistrée.")}}
function toggleCompact(){compact=!compact;localStorage.setItem("compact_v6",compact?"1":"0");renderAll()}
function ck(t,s){return t+"_"+s.replaceAll("/","_")}function getC(t,s){try{return JSON.parse(localStorage.getItem(ck(t,s))||"null")}catch(e){return null}}function setC(t,s,d){localStorage.setItem(ck(t,s),JSON.stringify({time:Date.now(),data:d}))}
function setErr(s,m){localStorage.setItem(ck("err",s),JSON.stringify({time:Date.now(),msg:m}))}function getErr(s){try{return JSON.parse(localStorage.getItem(ck("err",s))||"null")}catch(e){return null}}function clearErr(s){localStorage.removeItem(ck("err",s))}
function fresh(c,min){return c&&Date.now()-c.time<min*60*1000}function num(x){const n=Number(x);return isFinite(n)?n:null}function fmt(n){return n===null||n===undefined||isNaN(n)?"-":"$"+Number(n).toFixed(2)}function pct(v){const n=num(v);if(n===null)return"-";return(n>=0?"+":"")+n.toFixed(2)+"%"}function cls(n){return(num(n)||0)>=0?"green":"red"}
function lastUpdate(s){const c=getC("quote",s);if(!c)return"-";return new Date(c.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}function dataAge(s){const c=getC("quote",s);if(!c)return"";const sec=Math.round((Date.now()-c.time)/1000);return sec<60?sec+" sec":Math.round(sec/60)+" min"}
function tvSymbol(sym){if(sym==="XAG/USD")return"TVC:SILVER";if(sym==="RACE")return"NYSE:RACE";if(sym==="STLA")return"NYSE:STLA";return"NASDAQ:"+sym}
async function td(path,params){const key=apiKey();if(!key)throw new Error("Ajoute ta clé Twelve Data via API.");const qs=new URLSearchParams({...params,apikey:key});const r=await fetch(`https://api.twelvedata.com/${path}?${qs.toString()}`);const j=await r.json();if(j.status==="error"||j.code||j.message)throw new Error(j.message||"Erreur API");return j}
async function loadQuote(s,force=false){const c=getC("quote",s);if(!force&&fresh(c,0.5))return c.data;const j=await td("quote",{symbol:s});setC("quote",s,j);return j}
async function loadDaily(s,force=false){const c=getC("daily",s);if(!force&&fresh(c,60))return c.data;const j=await td("time_series",{symbol:s,interval:"1day",outputsize:"220"});setC("daily",s,j);return j}
async function loadIntraday(s,force=false){const c=getC("intra",s);if(!force&&fresh(c,0.5))return c.data;const j=await td("time_series",{symbol:s,interval:"5min",outputsize:"78"});setC("intra",s,j);return j}
function values(ts){return(ts?.values||[]).slice().reverse().map(x=>({date:x.datetime,open:num(x.open),high:num(x.high),low:num(x.low),close:num(x.close),volume:num(x.volume)||0})).filter(x=>x.close)}
function SMA(a,p){if(a.length<p)return null;return a.slice(-p).reduce((x,y)=>x+y.close,0)/p}function EMA(a,p){if(a.length<p)return null;const k=2/(p+1);let e=a.slice(0,p).reduce((x,y)=>x+y.close,0)/p;for(let i=p;i<a.length;i++)e=a[i].close*k+e*(1-k);return e}
function RSI(a,p=14){if(a.length<p+1)return null;let g=0,l=0,s=a.slice(-(p+1));for(let i=1;i<s.length;i++){const d=s[i].close-s[i-1].close;if(d>=0)g+=d;else l-=d}if(l===0)return 100;return 100-(100/(1+(g/p)/(l/p)))}
function ATR(a,p=14){if(a.length<p+1)return null;let tr=[];for(let i=1;i<a.length;i++){const h=a[i].high,l=a[i].low,pc=a[i-1].close;tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)))}return tr.slice(-p).reduce((x,y)=>x+y,0)/p}
function MACD(a){if(a.length<35)return null;const e12=EMA(a,12),e26=EMA(a,26);return e12&&e26?e12-e26:null}
function support(a,p=30){if(a.length<p)return null;return Math.min(...a.slice(-p).map(x=>x.low))}function resistance(a,p=30){if(a.length<p)return null;return Math.max(...a.slice(-p).map(x=>x.high))}
function trend(a){const s20=SMA(a,20),s50=SMA(a,50),s200=SMA(a,200),c=a.at(-1)?.close;if(!s20||!s50)return"n/a";if(c>s20&&s20>s50&&(!s200||s50>s200))return"Haussière forte";if(c>s20&&s20>s50)return"Haussière";if(c<s20&&s20<s50)return"Baissière";return"Neutre"}
function volumeSignal(a){if(a.length<21)return"n/a";const v=a.at(-1).volume||0,avg=a.slice(-21,-1).reduce((x,y)=>x+(y.volume||0),0)/20;if(!avg)return"n/a";if(v>avg*1.8)return"Volume très fort";if(v>avg*1.25)return"Volume supérieur";if(v<avg*.7)return"Volume faible";return"Volume normal"}
function gapInfo(q){const o=num(q.open),p=num(q.previous_close);return o&&p?(o-p)/p*100:null}
function technical(s){const q=getC("quote",s)?.data,d=values(getC("daily",s)?.data),i=values(getC("intra",s)?.data),a=d.length?d:null;if(!q||!a)return null;const c=num(q.close)||a.at(-1).close,rsi=RSI(a),rsi5=i.length?RSI(i,14):null,s20=SMA(a,20),s50=SMA(a,50),s200=SMA(a,200),atr=ATR(a),sup=support(a),res=resistance(a),macd=MACD(a);const distSup=sup?((c-sup)/c*100):null,distRes=res?((res-c)/c*100):null,day=num(q.percent_change)||0,gap=gapInfo(q);let score=50,dayScore=50;if(rsi!==null){if(rsi<30)score+=16;else if(rsi<40)score+=9;else if(rsi>75)score-=16;else if(rsi>68)score-=8}if(s20&&c>s20)score+=8;if(s50&&c>s50)score+=8;if(s200&&c>s200)score+=6;if(s20&&s50&&s20>s50)score+=6;if(s20&&s50&&s20<s50)score-=6;if(distSup!==null&&distSup<3)score+=8;if(distRes!==null&&distRes<3)score-=6;if(day>2)score+=4;if(day>5)score-=8;if(day<-4)score+=3;if(volumeSignal(a).includes("fort"))score+=5;if(macd&&macd>0)score+=4;if(rsi5!==null){if(rsi5<30)dayScore+=18;else if(rsi5<40)dayScore+=9;else if(rsi5>75)dayScore-=18;else if(rsi5>68)dayScore-=8}if(day>0)dayScore+=6;if(day>3)dayScore-=8;if(atr&&c&&atr/c*100>4)dayScore-=6;if(gap!==null&&Math.abs(gap)>2)dayScore+=4;score=Math.max(0,Math.min(100,Math.round(score)));dayScore=Math.max(0,Math.min(100,Math.round(dayScore)));let sig="Attendre",tone="wait";const breakout=res&&c>res*.997&&day>0;if(breakout&&score>=62){sig="Breakout";tone="breakout"}else if(rsi!==null&&rsi<35&&distSup!==null&&distSup<6&&score>=58){sig="Zone achat";tone="buy"}else if(dayScore>=68&&rsi5!==null&&rsi5<55){sig="Day trade possible";tone="daytrade"}else if(score>=70&&day<4){sig="Surveiller achat";tone="watch"}else if((rsi!==null&&rsi>70)||(distRes!==null&&distRes<2)||day>5){sig="Prendre profit";tone="sell"}const risk=riskLevel({atr,c,day,rsi,dayScore}),plan=tradePlan({sig,c,atr,sup,res});return{q,c,rsi,rsi5,s20,s50,s200,atr,sup,res,distSup,distRes,score,dayScore,sig,tone,tr:trend(a),vol:volumeSignal(a),day,gap,macd,risk,plan,advice:makeAdvice(sig)}}
function riskLevel(t){let r=0;if(t.atr&&t.c&&t.atr/t.c*100>4)r+=2;if(Math.abs(t.day)>4)r+=2;if(t.rsi>75||t.rsi<25)r+=1;if(t.dayScore<45)r+=1;return r>=4?["Élevé","red"]:r>=2?["Moyen","amber"]:["Faible/Normal","green"]}
function tradePlan(t){if(!t.c)return"Plan indisponible.";const stop=t.atr?t.c-t.atr*.7:null,target=t.atr?t.c+t.atr*1.2:null;if(t.sig==="Prendre profit")return`Prendre profit partiel ou relever stop. Résistance proche: ${fmt(t.res)}.`;if(t.sig==="Zone achat")return`Entrée progressive. Stop indicatif: ${fmt(t.sup||stop)}. Objectif: ${fmt(t.res||target)}.`;if(t.sig==="Day trade possible")return`Day trade: objectif rapide ${fmt(target)}, stop serré ${fmt(stop)}.`;if(t.sig==="Breakout")return`Cassure possible. Attendre confirmation volume. Stop sous cassure: ${fmt(t.res||stop)}.`;if(t.sig==="Surveiller achat")return`Surveiller repli vers support ${fmt(t.sup)} ou cassure au-dessus de ${fmt(t.res)}.`;return"Attendre un signal plus clair."}
function makeAdvice(sig){if(sig==="Prendre profit")return"Titre tendu : sécuriser gains ou stop relevé.";if(sig==="Zone achat")return"Zone intéressante mais entrée progressive uniquement.";if(sig==="Breakout")return"Cassure potentielle : confirmer avec volume.";if(sig==="Surveiller achat")return"Setup correct : surveiller repli ou cassure.";if(sig==="Day trade possible")return"Intraday intéressant : stop serré obligatoire.";return"Pas de signal fort : attendre confirmation."}
function rankLoaded(){return watchlist.map(w=>({w,t:technical(w.symbol),err:getErr(w.symbol)})).filter(x=>x.t).sort((a,b)=>(b.t.score+b.t.dayScore)-(a.t.score+a.t.dayScore))}function allErrors(){return watchlist.map(w=>({w,err:getErr(w.symbol)})).filter(x=>x.err)}
function filteredList(l){if(currentFilter==="buy")return l.filter(x=>["Zone achat","Surveiller achat","Breakout","Day trade possible"].includes(x.t.sig));if(currentFilter==="sell")return l.filter(x=>x.t.sig==="Prendre profit");if(currentFilter==="day")return l.filter(x=>x.t.dayScore>=60||x.t.sig==="Day trade possible");if(currentFilter==="strong")return l.filter(x=>x.t.score>=70);return l}
function renderScanner(){const all=rankLoaded(),loaded=filteredList(all),errors=allErrors();document.getElementById("scanner").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><div class="small">Résumé IA</div><div class="note">${summaryAI(all)}</div><div class="toolbar"><button class="primary" onclick="loadNextFull()">Charger prochaine</button><button class="secondary" onclick="refreshLoaded()">Force refresh live</button></div></div><div class="card"><b>Watchlist modifiable</b><div class="kv">Prix avec cache 30 sec. Chaque carte affiche High/Low/Open du jour et l’heure de MAJ.</div><div class="chips">${watchlist.map(w=>`<span class="chip">${w.symbol}<button onclick="removeWatch('${w.symbol.replace("'","\\'")}')">×</button></span>`).join("")}</div><hr><input id="newSymbol" placeholder="Ajouter ticker ex: META, AMZN, TSLA, AAPL"><button class="secondary" onclick="addWatch()">Ajouter</button><button class="danger" onclick="resetCache()">Vider cache données</button></div><div class="card"><b>Classement rapide</b>${rankingTable(all)}</div>${errors.length?`<div class="card"><b>Erreurs ignorées</b><div class="warn">${errors.map(x=>`${x.w.symbol}: ${x.err.msg}`).join("<br>")}</div></div>`:""}</div><div><div class="filterbar"><button class="secondary" onclick="setFilter('all')">Tous</button><button class="secondary" onclick="setFilter('buy')">Achat</button><button class="secondary" onclick="setFilter('sell')">Vente</button><button class="secondary" onclick="setFilter('day')">Day</button><button class="secondary" onclick="setFilter('strong')">Score 70+</button></div><div class="stockGrid ${compact?'compact':''}">${loaded.map(x=>cardHTML(x.w,x.t)).join("")||`<div class="card"><b>Aucune donnée complète.</b><div class="note">Clique sur “Charger prochaine”.</div></div>`}</div></div></div>`}
function summaryAI(l){if(!l.length)return"Charge quelques actions pour obtenir un classement IA.";const top=l[0],sell=l.find(x=>x.t.sig==="Prendre profit"),day=l.find(x=>x.t.dayScore>=68),buy=l.find(x=>["Zone achat","Breakout"].includes(x.t.sig));let s=`Meilleur score global : ${top.w.symbol} (${top.t.score}/100 swing, ${top.t.dayScore}/100 day). `;if(day)s+=`Meilleur setup day : ${day.w.symbol}. `;if(buy)s+=`Opportunité achat/cassure : ${buy.w.symbol} — ${buy.t.sig}. `;if(sell)s+=`Prise de profit à surveiller : ${sell.w.symbol}. `;s+="Données quote: cache 30 sec. Utilise Force refresh live si Investing affiche un prix différent.";return s}
function rankingTable(l){if(!l.length)return`<div class="note">Charge quelques actions.</div>`;return`<table class="table"><tr><th>Ticker</th><th>Signal</th><th>Swing</th><th>Day</th></tr>${l.slice(0,10).map(x=>`<tr><td>${x.w.symbol}</td><td>${x.t.sig}</td><td>${x.t.score}</td><td>${x.t.dayScore}</td></tr>`).join("")}</table>`}
function cardHTML(w,t){return`<div class="card"><div class="row"><div><span class="ticker">${w.symbol}</span> <span class="badge ${t.tone}">${t.sig}</span><div class="name">${t.q.name||w.label} · ${w.sector}</div></div><div class="price">${fmt(t.c)}<br><span class="${cls(t.day)}">${pct(t.day)}</span></div></div><div class="grid"><div class="metric"><div class="l">High jour</div><div class="v">${fmt(num(t.q.high))}</div></div><div class="metric"><div class="l">Low jour</div><div class="v">${fmt(num(t.q.low))}</div></div><div class="metric"><div class="l">Open</div><div class="v">${fmt(num(t.q.open))}</div></div></div><div class="grid"><div class="metric"><div class="l">RSI D</div><div class="v">${t.rsi?Math.round(t.rsi):"-"}</div></div><div class="metric"><div class="l">RSI 5m</div><div class="v">${t.rsi5?Math.round(t.rsi5):"-"}</div></div><div class="metric"><div class="l">Swing/Day</div><div class="v">${t.score}/${t.dayScore}</div></div></div><div class="grid extra"><div class="metric"><div class="l">SMA20</div><div class="v">${fmt(t.s20)}</div></div><div class="metric"><div class="l">SMA50</div><div class="v">${fmt(t.s50)}</div></div><div class="metric"><div class="l">SMA200</div><div class="v">${fmt(t.s200)}</div></div></div><div class="grid extra"><div class="metric"><div class="l">Support</div><div class="v">${fmt(t.sup)}</div></div><div class="metric"><div class="l">Résistance</div><div class="v">${fmt(t.res)}</div></div><div class="metric"><div class="l">ATR</div><div class="v">${fmt(t.atr)}</div></div></div><div class="grid extra"><div class="metric"><div class="l">Gap</div><div class="v">${t.gap!==null?pct(t.gap):"-"}</div></div><div class="metric"><div class="l">Risque</div><div class="v ${t.risk[1]}">${t.risk[0]}</div></div><div class="metric"><div class="l">MACD</div><div class="v">${t.macd?Number(t.macd).toFixed(2):"-"}</div></div></div><div class="grid2 extra"><div class="metric"><div class="l">Tendance</div><div class="v">${t.tr}</div></div><div class="metric"><div class="l">Volume</div><div class="v">${t.vol}</div></div></div><div class="progress"><div class="bar" style="width:${Math.max(t.score,t.dayScore)}%"></div></div><div class="note"><b>Plan:</b> ${t.plan}<br>${t.advice}<br><span class="muted">MAJ prix : ${lastUpdate(w.symbol)} · âge donnée : ${dataAge(w.symbol)}</span></div><button class="secondary" onclick="loadFull('${w.symbol}')">Refresh ${w.symbol}</button><button class="secondary" onclick="openChart('${w.symbol}')">Voir graphique</button></div>`}
async function loadNextFull(){const n=watchlist.find(w=>!technical(w.symbol)&&!getErr(w.symbol));if(!n){alert("Toutes les actions possibles sont chargées ou en erreur.");return}await loadFull(n.symbol)}
async function loadFull(s){try{clearErr(s);await loadQuote(s,true);await new Promise(r=>setTimeout(r,700));await loadDaily(s,false);await new Promise(r=>setTimeout(r,700));try{await loadIntraday(s,true)}catch(e){}}catch(e){setErr(s,e.message)}renderAll()}
async function refreshLoaded(){const syms=watchlist.filter(w=>technical(w.symbol)).map(w=>w.symbol);if(!syms.length)return alert("Aucune action chargée.");for(const s of syms){try{clearErr(s);await loadQuote(s,true);await new Promise(r=>setTimeout(r,600));try{await loadIntraday(s,true)}catch(e){}}catch(e){setErr(s,e.message)}}renderAll()}
function setFilter(f){currentFilter=f;renderScanner()}function addWatch(){const v=document.getElementById("newSymbol").value.trim().toUpperCase();if(!v)return;if(watchlist.some(w=>w.symbol===v))return alert("Déjà dans la watchlist.");watchlist.push({symbol:v,label:v,sector:"Custom"});saveWatch();renderScanner()}function removeWatch(s){watchlist=watchlist.filter(w=>w.symbol!==s);["quote","daily","intra","err"].forEach(t=>localStorage.removeItem(ck(t,s)));saveWatch();renderAll()}function resetCache(){if(!confirm("Vider les données chargées ?"))return;Object.keys(localStorage).filter(k=>k.startsWith("quote_")||k.startsWith("daily_")||k.startsWith("intra_")||k.startsWith("err_")).forEach(k=>localStorage.removeItem(k));renderAll()}
function renderDay(){const list=rankLoaded().filter(x=>x.t.dayScore>=55||["Day trade possible","Breakout","Prendre profit"].includes(x.t.sig)).sort((a,b)=>b.t.dayScore-a.t.dayScore);document.getElementById("daytrading").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Mode Day Trading</b><div class="note">Score day basé sur RSI 5min, gap, ATR, variation jour. Refresh live conseillé avant ordre.</div></div></div><div class="stockGrid ${compact?'compact':''}">${list.map(x=>cardHTML(x.w,x.t)).join("")||`<div class="card">Aucun setup day trading clair.</div>`}</div></div>`}
function renderCharts(){const buttons=watchlist.map(w=>`<button class="secondary" onclick="selectChart('${w.symbol}')">${w.symbol}</button>`).join("");document.getElementById("charts").innerHTML=`<div class="card ai"><b>Graphique intégré</b><div class="note">TradingView pour confirmer visuellement supports, résistances, cassures et tendance.</div></div><div class="chartControls">${buttons}</div><div class="chartWrap" id="tvchart"></div>`;loadTradingView(selectedChart)}
function selectChart(s){selectedChart=s;localStorage.setItem("selectedChart_v6",s);loadTradingView(s)}function openChart(s){selectedChart=s;localStorage.setItem("selectedChart_v6",s);document.querySelectorAll(".nav button")[2].click()}
function loadTradingView(sym){const box=document.getElementById("tvchart");if(!box)return;box.innerHTML="";const s=document.createElement("script");s.src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";s.async=true;s.innerHTML=JSON.stringify({autosize:true,symbol:tvSymbol(sym),interval:"15",timezone:"Europe/Zurich",theme:"dark",style:"1",locale:"fr",enable_publishing:false,allow_symbol_change:true,studies:["RSI@tv-basicstudies","MASimple@tv-basicstudies","MACD@tv-basicstudies"],support_host:"https://www.tradingview.com"});box.appendChild(s)}

function portfolioSummary(){
 let total=0,pnl=0,has=0,risk=0;
 portfolio.forEach(p=>{const t=technical(p.symbol),cur=t?.c,buy=num(p.buy),qty=num(p.qty);if(cur&&buy&&qty){total+=cur*qty;pnl+=(cur-buy)*qty;has++; const stop=num(p.stop); if(stop)risk+=Math.max(0,(cur-stop)*qty)}})
 if(!has)return"Complète tes PRU et quantités pour obtenir le P/L global.";
 return `Valeur suivie: ${fmt(total)} · P/L estimé: ${(pnl>=0?"+":"")+pnl.toFixed(0)} · Risque jusqu’aux stops: ${risk?fmt(risk):"-"}.`;
}
function positionAdvice(p,t){
 const cur=t.c, stop=num(p.stop), target=num(p.target), buy=num(p.buy);
 if(stop&&cur<=stop)return"Stop touché/proche : protéger le capital.";
 if(target&&cur>=target)return"Objectif atteint : prendre profit ou relever stop.";
 if(buy&&cur>buy*1.1)return"+10% atteint : envisager prise partielle.";
 if(t.sig==="Prendre profit")return"Signal IA de prise de profit.";
 if(["Zone achat","Surveiller achat","Breakout"].includes(t.sig))return"Position techniquement constructive, garder avec stop.";
 return"Conserver seulement si ton plan initial reste valide.";
}
function renderPortfolio(){
 const rows=portfolio.map((p,i)=>{const t=technical(p.symbol),cur=t?.c||null,buy=num(p.buy),qty=num(p.qty),pnl=cur&&buy&&qty?(cur-buy)*qty:null,perf=cur&&buy?((cur-buy)/buy*100):null,value=cur&&qty?cur*qty:null;return`<div class="card"><div class="row"><div><span class="ticker">${p.symbol}</span><div class="name">${p.type} · ${p.lev||"levier ?"}</div></div><div class="price">${cur?fmt(cur):"Non chargé"}<br><span class="${(perf||0)>=0?'green':'red'}">${perf!==null?pct(perf):""}</span></div></div><div class="grid"><div class="metric"><div class="l">PRU</div><div class="v">${p.buy||"-"}</div></div><div class="metric"><div class="l">Qté</div><div class="v">${p.qty||"-"}</div></div><div class="metric"><div class="l">P/L</div><div class="v">${pnl!==null?(pnl>=0?"+":"")+pnl.toFixed(0):"-"}</div></div></div><div class="grid extra"><div class="metric"><div class="l">Valeur</div><div class="v">${value?fmt(value):"-"}</div></div><div class="metric"><div class="l">Stop</div><div class="v">${p.stop||"-"}</div></div><div class="metric"><div class="l">Objectif</div><div class="v">${p.target||"-"}</div></div></div>${t?`<div class="note"><b>IA position:</b> ${positionAdvice(p,t)}<br>${t.plan}</div>`:`<div class="note">Charge ${p.symbol} dans le scanner pour analyser cette position.</div>`}<button class="secondary" onclick="editPosition(${i})">Modifier</button><button class="danger" onclick="removePosition(${i})">Supprimer</button></div>`}).join("");
 document.getElementById("portfolio").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Portefeuille avancé</b><div class="note">${portfolioSummary()}</div></div><div class="card"><b>Ajouter position</b><input id="ps" placeholder="Ticker"><select id="pt"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini Future</option><option>Call option</option><option>Put option</option></select><input id="pl" placeholder="Levier"><input id="pb" placeholder="Prix achat / PRU"><input id="pq" placeholder="Quantité"><input id="pst" placeholder="Stop"><input id="pta" placeholder="Objectif"><button class="primary" onclick="addPosition()">Ajouter</button></div></div><div class="portfolioGrid">${rows}</div></div>`;
}
function editPosition(i){const p=portfolio[i];p.buy=prompt("Prix d’achat / PRU",p.buy)||p.buy;p.qty=prompt("Quantité",p.qty)||p.qty;p.stop=prompt("Stop loss",p.stop)||p.stop;p.target=prompt("Objectif",p.target)||p.target;p.lev=prompt("Levier",p.lev)||p.lev;savePort();renderPortfolio();renderAlerts()}
function removePosition(i){if(!confirm("Supprimer cette position ?"))return;portfolio.splice(i,1);savePort();renderPortfolio();renderAlerts()}
function addPosition(){const p={symbol:ps.value.trim().toUpperCase(),type:pt.value,lev:pl.value,buy:pb.value,qty:pq.value,stop:pst.value,target:pta.value};if(!p.symbol)return;portfolio.push(p);savePort();renderPortfolio()}

function renderAlerts(){const arr=[];rankLoaded().forEach(x=>{const t=x.t;if(t.sig!=="Attendre")arr.push(`${x.w.symbol}: ${t.sig} — ${t.plan}`);if(t.dayScore>=75)arr.push(`${x.w.symbol}: score day trading élevé (${t.dayScore}/100).`)});document.getElementById("alerts").innerHTML=`<div class="card ai"><b>Alertes IA</b><div class="note">Alertes basées sur prix refreshés, RSI, supports/résistances, ATR.</div></div><div class="alertList">${arr.map(a=>`<div class="card">${a}</div>`).join("")||`<div class="card">Aucune alerte forte.</div>`}</div>`}

function renderHeatmap(){
 const list=rankLoaded();
 const tiles=list.map(x=>{const ch=x.t.day||0;return`<div class="tile ${ch>0?'tilePos':ch<0?'tileNeg':'tileNeu'}"><div class="sym">${x.w.symbol}</div><div class="chg ${cls(ch)}">${pct(ch)}</div><div class="kv">${x.t.sig}</div><div class="kv">Swing ${x.t.score} · Day ${x.t.dayScore}</div></div>`}).join("");
 const sectors={};
 list.forEach(x=>{const sec=x.w.sector||"Autre"; if(!sectors[sec])sectors[sec]=[]; sectors[sec].push(x.t.day||0)});
 const secRows=Object.entries(sectors).map(([k,v])=>`<tr><td>${k}</td><td>${pct(v.reduce((a,b)=>a+b,0)/v.length)}</td><td>${v.length}</td></tr>`).join("");
 document.getElementById("heatmap").innerHTML=`<div class="card ai"><b>Heatmap marché</b><div class="note">Vue rapide des forces/faiblesses par action et par secteur chargé.</div></div><div class="heatmap">${tiles||"<div class='card'>Charge des actions pour afficher la heatmap.</div>"}</div><div class="card" style="margin-top:12px"><b>Force par secteur</b><table class="table"><tr><th>Secteur</th><th>Moy. jour</th><th>Nb</th></tr>${secRows}</table></div>`;
}
function copilotText(){
 const list=rankLoaded();
 if(!list.length)return"Charge quelques actions dans le scanner puis reviens ici.";
 const top=list[0], day=list.find(x=>x.t.dayScore>=68), sell=list.find(x=>x.t.sig==="Prendre profit"), buy=list.find(x=>["Zone achat","Breakout","Surveiller achat"].includes(x.t.sig));
 let txt=`Synthèse IA\n\n`;
 txt+=`Meilleur score global : ${top.w.symbol} (${top.t.score}/100 swing, ${top.t.dayScore}/100 day).\n`;
 if(day)txt+=`Meilleur setup day trading : ${day.w.symbol}. Plan : ${day.t.plan}\n`;
 if(buy)txt+=`Setup achat/cassure à surveiller : ${buy.w.symbol} — ${buy.t.sig}. Plan : ${buy.t.plan}\n`;
 if(sell)txt+=`Action tendue / prise de profit : ${sell.w.symbol}. Plan : ${sell.t.plan}\n`;
 txt+=`\nRègle de prudence : ne pas entrer si le prix live de l’app ne correspond pas au graphique TradingView/Investing. Avec levier, réduire la taille et utiliser un stop.`;
 return txt;
}
function renderCopilot(){
 const options=rankLoaded().map(x=>`<option value="${x.w.symbol}">${x.w.symbol}</option>`).join("");
 document.getElementById("copilot").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>IA Copilot</b><div class="note">Résumé automatique basé sur les données chargées, les scores, supports/résistances, ATR et signaux.</div></div><div class="card"><b>Analyser une action</b><select id="copilotSym">${options}</select><button class="primary" onclick="analyzeOne()">Analyser</button><div id="oneAnalysis" class="note"></div></div></div><div class="card"><div class="copilotBox">${copilotText()}</div></div></div>`;
}
function analyzeOne(){
 const s=document.getElementById("copilotSym").value, t=technical(s);
 if(!t)return;
 document.getElementById("oneAnalysis").innerHTML=`<b>${s}</b><br>Signal: ${t.sig}<br>Plan: ${t.plan}<br>Prix: ${fmt(t.c)} · High: ${fmt(num(t.q.high))} · Low: ${fmt(num(t.q.low))}<br>Risque: ${t.risk[0]}`;
}
function journal(){return JSON.parse(localStorage.getItem("trade_journal_v7")||"[]")}
function saveJournal(j){localStorage.setItem("trade_journal_v7",JSON.stringify(j))}
function renderJournal(){
 const j=journal();
 const rows=j.map((x,i)=>`<div class="card"><b>${x.sym}</b> · ${x.side}<div class="note">${x.date}<br>Entrée: ${x.entry} · Sortie: ${x.exit||"-"} · Résultat: ${x.result||"-"}<br>${x.reason||""}</div><button class="danger" onclick="delTrade(${i})">Supprimer</button></div>`).join("");
 document.getElementById("journal").innerHTML=`<div class="layout"><div class="side"><div class="card ai"><b>Journal de trading</b><div class="note">Note tes trades pour identifier ce qui marche vraiment.</div></div><div class="card"><input id="jsym" placeholder="Ticker"><select id="jside"><option>Achat</option><option>Vente</option><option>Short</option><option>Option Call</option><option>Option Put</option></select><input id="jentry" placeholder="Prix entrée"><input id="jexit" placeholder="Prix sortie"><input id="jresult" placeholder="Résultat CHF/%"><input id="jreason" placeholder="Pourquoi ce trade ?"><button class="primary" onclick="addTrade()">Ajouter trade</button></div></div><div class="journalGrid">${rows||"<div class='card'>Aucun trade enregistré.</div>"}</div></div>`;
}
function addTrade(){const j=journal();j.unshift({date:new Date().toLocaleString("fr-FR"),sym:jsym.value.toUpperCase(),side:jside.value,entry:jentry.value,exit:jexit.value,result:jresult.value,reason:jreason.value});saveJournal(j);renderJournal()}
function delTrade(i){const j=journal();j.splice(i,1);saveJournal(j);renderJournal()}

function show(id,btn){["scanner","daytrading","charts","heatmap","portfolio","copilot","journal","alerts"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(id==="daytrading")renderDay();if(id==="charts")renderCharts();if(id==="heatmap")renderHeatmap();if(id==="portfolio")renderPortfolio();if(id==="copilot")renderCopilot();if(id==="journal")renderJournal();if(id==="alerts")renderAlerts()}
function renderAll(){renderScanner();renderDay();renderCharts();renderHeatmap();renderPortfolio();renderCopilot();renderJournal();renderAlerts()}renderAll();
</script>
</body>
</html>
