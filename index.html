<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trading Cockpit</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#06070a;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif} .app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#111827,#030712);padding:20px 16px 90px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.small{color:#9ca3af;font-size:12px}.title{font-size:26px;font-weight:800;margin:4px 0}.logo{width:46px;height:46px;border-radius:16px;background:#ffffff18;display:grid;place-items:center}.card{background:#ffffff0d;border:1px solid #ffffff1a;border-radius:24px;padding:16px;margin-bottom:14px;box-shadow:0 12px 30px #0006}.ai{background:linear-gradient(135deg,#2563eb33,#10b98122)}.row{display:flex;justify-content:space-between;gap:12px}.ticker{font-size:20px;font-weight:800}.muted{color:#9ca3af;font-size:13px}.price{text-align:right;font-weight:700}.green{color:#6ee7b7}.red{color:#fca5a5}.pill{font-size:12px;padding:6px 9px;border-radius:999px;border:1px solid #ffffff22}.buy{background:#10b98122;color:#6ee7b7}.sell{background:#ef444422;color:#fca5a5}.wait{background:#ffffff14;color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.metric{background:#00000040;border:1px solid #ffffff14;border-radius:16px;padding:10px}.metric b{font-size:14px}.nav{position:fixed;left:0;right:0;bottom:0;background:#000c;backdrop-filter:blur(12px);border-top:1px solid #ffffff14}.navin{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.nav button{border:0;border-radius:16px;padding:11px 6px;background:transparent;color:#9ca3af;font-weight:700}.nav button.active{background:white;color:#000} input,select{width:100%;padding:12px;border-radius:14px;border:1px solid #ffffff22;background:#0008;color:white;margin:6px 0}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;padding:13px;border-radius:16px;border:0;background:white;color:black;font-weight:800;margin-top:8px}.hidden{display:none}.alert{border-color:#f59e0b55;background:#f59e0b14}.risk{font-size:12px;color:#fbbf24;margin-top:8px}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div><div class="small">AI Trading Cockpit</div><div class="title">Market Scanner</div></div><div class="logo">📈</div></div>
  <section id="scanner"></section>
  <section id="portfolio" class="hidden"></section>
  <section id="alerts" class="hidden"></section>
</div>
<nav class="nav"><div class="navin"><button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('alerts',this)">Alertes</button></div></nav>
<script>
const stocks=[{t:'NVDA',n:'Nvidia',s:'AI / Semis',p:142.2,d:1.8,r:67,tr:'Bullish',sc:78},{t:'AMD',n:'AMD',s:'Semis',p:164.5,d:-1.1,r:42,tr:'Neutral',sc:71},{t:'MU',n:'Micron',s:'Memory',p:61.8,d:-2.4,r:34,tr:'Watch',sc:74},{t:'QCOM',n:'Qualcomm',s:'Semis',p:186.1,d:.7,r:58,tr:'Bullish',sc:69},{t:'AVGO',n:'Broadcom',s:'AI / Semis',p:1294.4,d:2.2,r:72,tr:'Extended',sc:73},{t:'PLTR',n:'Palantir',s:'AI Software',p:23.7,d:3.4,r:76,tr:'Hot',sc:62}];
let positions=JSON.parse(localStorage.getItem('positions')||'[{"asset":"MU","type":"Action","lev":"x1","buy":60,"qty":20,"current":61.8,"stop":57,"target":69},{"asset":"Silver ETF","type":"ETF levier","lev":"x3","buy":75,"qty":15,"current":93.5,"stop":88,"target":96}]');
function sig(x){if(x.r>=72)return ['Prendre profit','sell']; if(x.r<=35&&x.sc>=70)return ['Zone achat','buy']; if(x.sc>=72&&x.r<68)return ['Surveiller achat','buy']; return ['Attendre','wait']}
function renderScanner(){scanner.innerHTML='<div class="card ai"><div class="small">Résumé IA</div><p>Focus semi-conducteurs. MU est proche d’une zone d’achat. AVGO et PLTR semblent déjà tendus : discipline sur les prises de profit.</p></div>'+stocks.map(x=>{let s=sig(x);return `<div class="card"><div class="row"><div><span class="ticker">${x.t}</span> <span class="pill ${s[1]}">${s[0]}</span><div class="muted">${x.n} · ${x.s}</div></div><div class="price">$${x.p}<br><span class="${x.d>=0?'green':'red'}">${x.d>=0?'+':''}${x.d}%</span></div></div><div class="grid"><div class="metric"><span class="muted">RSI</span><br><b>${x.r}</b></div><div class="metric"><span class="muted">Trend</span><br><b>${x.tr}</b></div><div class="metric"><span class="muted">Score</span><br><b>${x.sc}/100</b></div></div></div>`}).join('')}
function renderPortfolio(){portfolio.innerHTML='<div class="card"><b>Ajouter une position</b><div class="formgrid"><input id="a" placeholder="Actif"><select id="ty"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini future</option><option>Call option</option><option>Put option</option></select><input id="lev" placeholder="Levier x1/x3"><input id="buy" placeholder="Prix achat" type="number"><input id="qty" placeholder="Quantité" type="number"><input id="cur" placeholder="Prix actuel" type="number"><input id="stop" placeholder="Stop"><input id="target" placeholder="Objectif"></div><button class="btn" onclick="addPos()">Ajouter</button></div>'+positions.map((p,i)=>{let perf=(p.current-p.buy)/p.buy*100, pnl=(p.current-p.buy)*p.qty;return `<div class="card"><div class="row"><div><div class="ticker">${p.asset}</div><div class="muted">${p.type} · ${p.lev}</div></div><div class="price ${perf>=0?'green':'red'}">${perf>=0?'+':''}${perf.toFixed(2)}%<br>$${pnl.toFixed(0)}</div></div><div class="grid"><div class="metric"><span class="muted">Achat</span><br><b>$${p.buy}</b></div><div class="metric"><span class="muted">Actuel</span><br><b>$${p.current}</b></div><div class="metric"><span class="muted">Valeur</span><br><b>$${(p.current*p.qty).toFixed(0)}</b></div></div><div class="risk">Stop: $${p.stop} · Objectif: $${p.target}</div></div>`}).join('')}
function renderAlerts(){let arr=[];stocks.forEach(x=>{if(x.r>=70)arr.push(`${x.t}: RSI suracheté, possible prise de profit.`);if(x.r<=35)arr.push(`${x.t}: RSI survendu, possible zone d’entrée si confirmation.`)});positions.forEach(p=>{let perf=(p.current-p.buy)/p.buy*100;if(perf>=10)arr.push(`${p.asset}: +10% atteint, envisager prise partielle.`);if(p.current<=p.stop)arr.push(`${p.asset}: stop touché, attention risque.`)});alerts.innerHTML=arr.map(a=>`<div class="card alert">⚠️ ${a}</div>`).join('')}
function addPos(){positions.push({asset:a.value,type:ty.value,lev:lev.value||'x1',buy:+buy.value,qty:+qty.value,current:+cur.value,stop:+stop.value,target:+target.value});localStorage.setItem('positions',JSON.stringify(positions));renderPortfolio();renderAlerts()}
function show(id,btn){['scanner','portfolio','alerts'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='portfolio')renderPortfolio();if(id==='alerts')renderAlerts()}
renderScanner();renderPortfolio();renderAlerts();
</script>
</body>
</html>
