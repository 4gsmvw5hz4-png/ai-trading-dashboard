<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trading Cockpit</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#05070a;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#0f1726,#070b12);padding:22px 14px 90px}.top{display:flex;justify-content:space-between;align-items:center}.small{font-size:12px;color:#8ea0b8}.title{font-size:25px;font-weight:900}.api{border:0;border-radius:14px;padding:12px 14px;background:#1b2435;color:white;font-weight:800}.card{background:#151c2a;border:1px solid #293349;border-radius:22px;padding:15px;margin:13px 0;box-shadow:0 10px 30px rgba(0,0,0,.2)}.summary{background:linear-gradient(135deg,#13284b,#07302f);border-color:#1f5b69}.row{display:flex;justify-content:space-between;gap:12px}.ticker{font-size:22px;font-weight:900}.badge{font-size:11px;border-radius:999px;padding:5px 8px}.buy{background:#083b2c;color:#7ef0bd}.sell{background:#431a24;color:#ff9caf}.wait{background:#252c3d;color:#c7d2e0}.price{text-align:right;font-weight:900}.green{color:#40e798}.red{color:#ff7b92}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}.metric{background:#0d121d;border:1px solid #20293b;border-radius:13px;padding:10px;font-size:12px}.metric b{display:block;margin-top:4px;font-size:13px}.nav{position:fixed;bottom:0;left:0;right:0;background:#06080d;border-top:1px solid #222;display:flex;justify-content:center}.navin{max-width:430px;width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.nav button{border:0;border-radius:16px;padding:12px;background:transparent;color:#9ba9bc;font-weight:800}.nav button.active{background:white;color:#05070a}.hidden{display:none}.formgrid{display:grid;gap:9px}.formgrid input,.formgrid select{width:100%;border:1px solid #2c3850;background:#0d121d;color:white;border-radius:12px;padding:11px}.whitebtn{background:white;color:#05070a;border:0;border-radius:14px;padding:12px;font-weight:900;width:100%;margin-top:8px}.error{color:#ff9caf;font-size:12px;line-height:1.35}.muted{color:#9ba9bc}.loading{padding:24px;text-align:center;color:#9ba9bc}.pill{font-size:11px;color:#9ba9bc}.link{color:#8ab4ff}.risk{font-size:11px;margin-top:8px;color:#ffdc8a}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div><div class="small">AI Trading Cockpit</div><div class="title">Market Scanner</div></div><button class="api" onclick="setApiKey()">API</button></div>
    <section id="scanner"><div id="status" class="loading">Chargement des données FMP...</div><div id="cards"></div></section>
    <section id="portfolio" class="hidden"><div class="card"><b>Ajouter une position</b><div class="formgrid" style="margin-top:12px"><input id="pa" placeholder="Actif ex: MU"><select id="pt"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini future</option><option>Call option</option><option>Put option</option></select><input id="pl" placeholder="Levier ex: x1 / x3"><input id="pb" placeholder="Prix achat"><input id="pq" placeholder="Quantité"><input id="pc" placeholder="Prix actuel"><input id="ps" placeholder="Stop loss"><input id="pg" placeholder="Objectif"><button class="whitebtn" onclick="addPos()">Ajouter</button></div></div><div id="poslist"></div></section>
    <section id="alerts" class="hidden"><div id="alertlist"></div></section>
  </div>
  <nav class="nav"><div class="navin"><button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('alerts',this)">Alertes</button></div></nav>
<script>
const tickers=['NVDA','AMD','MU','QCOM','AVGO','TSM','ASML','ARM','PLTR','AAPL','MSFT'];
let stocks=[];
let positions=JSON.parse(localStorage.getItem('positions')||'[]');
function getKey(){return localStorage.getItem('fmpKey')||''}
function setApiKey(){const current=getKey(); const k=prompt('Colle ta clé API Financial Modeling Prep',current); if(k){localStorage.setItem('fmpKey',k.trim()); loadData();}}
function sig(rsi,change){ if(rsi>=70) return ['Prendre profit','sell']; if(rsi<=35) return ['Zone achat','buy']; if(change>2) return ['Momentum','buy']; return ['Attendre','wait']; }
function trend(rsi,change){ if(rsi>=70) return 'Tendu'; if(rsi<=35) return 'Survendu'; if(change>1) return 'Haussier'; if(change<-1) return 'Baissier'; return 'Neutre';}
function score(rsi,change){let s=60; if(rsi<35)s+=15; if(rsi>70)s-=8; if(change>0)s+=8; if(change>3)s-=5; return Math.max(25,Math.min(92,Math.round(s)));}
async function loadData(){
 const key=getKey(); const st=document.getElementById('status'); const cards=document.getElementById('cards'); cards.innerHTML='';
 if(!key){st.innerHTML='<div class="card"><b>Clé API manquante</b><p class="error">Clique sur API en haut à droite et colle ta clé FMP.</p></div>'; return;}
 st.textContent='Chargement des prix temps réel FMP...';
 try{
   const url='https://financialmodelingprep.com/stable/batch-quote?symbols='+tickers.join(',')+'&apikey='+encodeURIComponent(key);
   const res=await fetch(url);
   const data=await res.json();
   if(!Array.isArray(data) || !data.length || data['Error Message']) throw new Error(JSON.stringify(data));
   stocks=data.map(x=>({t:x.symbol||x.Symbol, name:x.name||x.symbol, price:Number(x.price||x.priceAvg50||0), change:Number(x.changePercentage||x.changesPercentage||x.changePercent||0), volume:x.volume||0, rsi: estimateRSI(Number(x.changePercentage||x.changesPercentage||0)), raw:x}));
   st.innerHTML='<div class="card summary"><div class="small">Résumé IA</div><p>Scanner connecté aux données FMP. Surveille surtout les titres avec RSI estimé bas, momentum positif et score supérieur à 70. Ne prends pas de levier sans stop clair.</p><div class="pill">Source: FMP stable batch-quote · Prix live/différés selon ton abonnement</div></div>';
   render();
 }catch(e){
   st.innerHTML='<div class="card"><b>Erreur données</b><p class="error">Le nouveau endpoint FMP répond encore avec une erreur ou ton plan ne donne pas accès au batch quote.</p><p class="error">Test à faire dans un onglet : https://financialmodelingprep.com/stable/batch-quote?symbols=NVDA,AAPL&apikey=TA_CLE</p><button class="whitebtn" onclick="setApiKey()">Modifier la clé API</button></div>';
   console.error(e);
 }
}
function estimateRSI(change){let r=50+change*4; return Math.max(20,Math.min(82,Math.round(r)));}
function render(){document.getElementById('cards').innerHTML=stocks.map(x=>{const [label,tone]=sig(x.rsi,x.change); return `<div class="card"><div class="row"><div><span class="ticker">${x.t}</span> <span class="badge ${tone}">${label}</span><div class="small">${x.name||''}</div></div><div class="price">$${x.price.toFixed(2)}<br><span class="${x.change>=0?'green':'red'}">${x.change>=0?'+':''}${x.change.toFixed(2)}%</span></div></div><div class="grid"><div class="metric">RSI estimé<b>${x.rsi}</b></div><div class="metric">Trend<b>${trend(x.rsi,x.change)}</b></div><div class="metric">Score<b>${score(x.rsi,x.change)}/100</b></div></div></div>`}).join(''); renderAlerts(); renderPos();}
function show(id,btn){['scanner','portfolio','alerts'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function addPos(){const p={a:pa.value,t:pt.value,l:pl.value,b:+pb.value,q:+pq.value,c:+pc.value,s:+ps.value,g:+pg.value}; if(!p.a||!p.b||!p.q)return alert('Remplis au minimum actif, prix achat et quantité'); positions.push(p); localStorage.setItem('positions',JSON.stringify(positions)); renderPos(); renderAlerts();}
function renderPos(){poslist.innerHTML=positions.map((p,i)=>{const perf=((p.c-p.b)/p.b*100)||0; const pnl=(p.c-p.b)*p.q; return `<div class="card"><div class="row"><div><b>${p.a}</b><div class="small">${p.t} · ${p.l||'x1'}</div></div><div class="price ${perf>=0?'green':'red'}">${perf>=0?'+':''}${perf.toFixed(2)}%<br>${pnl>=0?'+':''}$${pnl.toFixed(0)}</div></div><div class="grid"><div class="metric">Achat<b>$${p.b}</b></div><div class="metric">Actuel<b>$${p.c}</b></div><div class="metric">Qté<b>${p.q}</b></div></div><div class="risk">Stop: ${p.s||'-'} · Objectif: ${p.g||'-'}</div><button class="whitebtn" onclick="positions.splice(${i},1);localStorage.setItem('positions',JSON.stringify(positions));renderPos();renderAlerts();">Supprimer</button></div>`}).join('')||'<div class="card muted">Aucune position ajoutée.</div>';}
function renderAlerts(){let arr=[]; stocks.forEach(x=>{if(x.rsi>=70)arr.push(`${x.t}: RSI estimé suracheté, attention prise de profit.`); if(x.rsi<=35)arr.push(`${x.t}: RSI estimé survendu, possible zone de surveillance.`)}); positions.forEach(p=>{if(p.g&&p.c>=p.g)arr.push(`${p.a}: objectif atteint.`); if(p.s&&p.c<=p.s)arr.push(`${p.a}: stop touché.`); if(p.b&&p.c&&((p.c-p.b)/p.b*100)>=10)arr.push(`${p.a}: +10% atteint, envisager prise partielle.`)}); alertlist.innerHTML=arr.map(a=>`<div class="card">⚠️ ${a}</div>`).join('')||'<div class="card muted">Pas d’alerte.</div>';}
loadData(); renderPos(); renderAlerts();
</script>
</body>
</html>
