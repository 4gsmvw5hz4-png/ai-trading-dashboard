<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trading Cockpit</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#05070a;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}.app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#111827,#05070a);padding:18px 14px 86px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.small{color:#94a3b8;font-size:12px}.title{font-size:25px;font-weight:800}.logo,.btn-icon{width:42px;height:42px;border-radius:16px;background:#1f2937;display:flex;align-items:center;justify-content:center}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:14px;margin:12px 0;box-shadow:0 10px 28px rgba(0,0,0,.18)}.summary{background:linear-gradient(135deg,rgba(37,99,235,.25),rgba(16,185,129,.16));border-color:rgba(56,189,248,.2)}.row{display:flex;justify-content:space-between;gap:10px}.ticker{font-size:22px;font-weight:900}.badge{font-size:11px;border-radius:99px;padding:5px 9px;border:1px solid}.buy{background:rgba(16,185,129,.14);color:#6ee7b7;border-color:rgba(16,185,129,.35)}.sell{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.35)}.wait{background:rgba(148,163,184,.14);color:#cbd5e1;border-color:rgba(148,163,184,.3)}.watch{background:rgba(59,130,246,.15);color:#93c5fd;border-color:rgba(59,130,246,.35)}.price{text-align:right;font-weight:800}.pos{color:#34d399}.neg{color:#fca5a5}.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.metric{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px}.metric small{color:#94a3b8;display:block;margin-bottom:5px}.metric b{font-size:14px}.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);padding:9px}.navin{max-width:430px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.nav button{border:0;border-radius:16px;padding:12px;background:transparent;color:#94a3b8;font-weight:700}.nav button.active{background:white;color:black}input,select{width:100%;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.12);border-radius:14px;color:white;padding:12px;margin:5px 0}button.primary{width:100%;border:0;border-radius:16px;padding:13px;background:white;color:black;font-weight:800;margin-top:8px}.hidden{display:none}.warn{color:#fbbf24;font-size:12px;line-height:1.4}.loader{font-size:12px;color:#94a3b8}.error{font-size:12px;color:#fca5a5}.linkbtn{border:0;background:#1f2937;color:white;border-radius:12px;padding:10px 12px;font-weight:700}.footer-note{font-size:11px;color:#64748b;margin-top:10px;line-height:1.35}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div><div class="small">AI Trading Cockpit</div><div class="title">Market Scanner</div></div><button class="linkbtn" onclick="openSettings()">API</button></div>
    <section id="scanner"></section>
    <section id="portfolio" class="hidden"></section>
    <section id="alerts" class="hidden"></section>
  </div>
  <div class="nav"><div class="navin"><button class="active" onclick="show('scanner',this)">Scanner</button><button onclick="show('portfolio',this)">Portfolio</button><button onclick="show('alerts',this)">Alertes</button></div></div>
<script>
const tickers=['NVDA','AMD','MU','QCOM','AVGO','TSM','ASML','ARM','PLTR','AAPL','MSFT'];
const names={NVDA:'Nvidia · AI / Semis',AMD:'AMD · Semis',MU:'Micron · Memory',QCOM:'Qualcomm · Semis',AVGO:'Broadcom · AI / Semis',TSM:'TSMC · Foundry',ASML:'ASML · Equipment',ARM:'ARM · Chips',PLTR:'Palantir · AI Software',AAPL:'Apple · Tech',MSFT:'Microsoft · Cloud / AI'};
let stocks=[];let positions=JSON.parse(localStorage.getItem('positions')||'[]');
function key(){return localStorage.getItem('FMP_API_KEY')||''}
function openSettings(){const k=prompt('Colle ta clé API Financial Modeling Prep ici. Elle sera stockée seulement dans ton navigateur.', key()); if(k!==null){localStorage.setItem('FMP_API_KEY',k.trim()); loadMarket();}}
function sig(rsi,score){ if(rsi>=72)return ['Prendre profit','sell']; if(rsi<=35&&score>=65)return ['Zone achat','buy']; if(score>=70&&rsi<68)return ['Surveiller achat','watch']; return ['Attendre','wait'];}
function scoreFrom(q,rsi){let s=50; const ch=Number(q.changesPercentage)||0; if(ch>0)s+=8;if(ch>2)s+=7;if(ch<-2)s-=6;if(rsi<35)s+=12;if(rsi>72)s-=10; if(Number(q.volume)>0)s+=5; return Math.max(0,Math.min(95,Math.round(s)));}
async function getRSI(t){try{const r=await fetch(`https://financialmodelingprep.com/api/v3/technical_indicator/daily/${t}?period=14&type=rsi&apikey=${key()}`);const j=await r.json();return Math.round(Number(j?.[0]?.rsi)||50)}catch(e){return 50}}
async function loadMarket(){renderLoading(); if(!key()){renderNoKey();return} try{const r=await fetch(`https://financialmodelingprep.com/api/v3/quote/${tickers.join(',')}?apikey=${key()}`); const quotes=await r.json(); if(!Array.isArray(quotes)||!quotes.length) throw new Error('No data'); const withRsi=[]; for(const q of quotes){const rsi=await getRSI(q.symbol); const score=scoreFrom(q,rsi); withRsi.push({ticker:q.symbol, price:Number(q.price)||0, day:Number(q.changesPercentage)||0, rsi, score, name:names[q.symbol]||q.name||q.symbol});} stocks=withRsi; renderScanner(); renderPortfolio(); renderAlerts(); }catch(e){document.getElementById('scanner').innerHTML=`<div class="card"><b>Erreur données</b><p class="error">Impossible de charger les données FMP. Vérifie la clé API ou les limites du plan gratuit.</p><button class="primary" onclick="openSettings()">Modifier la clé API</button></div>`}}
function renderNoKey(){document.getElementById('scanner').innerHTML=`<div class="card summary"><div class="small">Configuration</div><p>Pour activer les vrais prix, colle ta clé API FMP dans l'app.</p><button class="primary" onclick="openSettings()">Ajouter la clé API</button><p class="footer-note">La clé reste dans ton navigateur, elle n'est pas mise dans GitHub.</p></div>`}
function renderLoading(){document.getElementById('scanner').innerHTML='<div class="card loader">Chargement des données de marché...</div>'}
function renderScanner(){let best=stocks.find(x=>x.rsi<=35)||stocks.sort((a,b)=>b.score-a.score)[0];document.getElementById('scanner').innerHTML=`<div class="card summary"><div class="small">Résumé IA</div><p>Focus semi-conducteurs. ${best?.ticker||'MU'} ressort comme valeur à surveiller. Les valeurs avec RSI élevé doivent être gérées avec discipline sur les prises de profit.</p><div class="footer-note">Données FMP actualisées au chargement. Outil d'aide, pas conseil financier.</div></div>`+stocks.map(s=>{const [label,cls]=sig(s.rsi,s.score);return `<div class="card"><div class="row"><div><span class="ticker">${s.ticker}</span> <span class="badge ${cls}">${label}</span><div class="small">${s.name}</div></div><div class="price">$${s.price.toFixed(2)}<br><span class="${s.day>=0?'pos':'neg'}">${s.day>=0?'+':''}${s.day.toFixed(2)}%</span></div></div><div class="metrics"><div class="metric"><small>RSI</small><b>${s.rsi}</b></div><div class="metric"><small>Trend</small><b>${s.day>=1?'Bullish':s.day<=-1?'Weak':'Neutral'}</b></div><div class="metric"><small>Score</small><b>${s.score}/100</b></div></div></div>`}).join('')}
function renderPortfolio(){document.getElementById('portfolio').innerHTML=`<div class="card"><b>Ajouter une position</b><input id="a" placeholder="Actif ex: MU"><select id="ty"><option>Action</option><option>ETF</option><option>ETF levier</option><option>Mini future</option><option>Call option</option><option>Put option</option></select><input id="lev" placeholder="Levier ex: x1, x3"><input id="buy" type="number" placeholder="Prix achat"><input id="qty" type="number" placeholder="Quantité"><input id="stop" type="number" placeholder="Stop"><input id="target" type="number" placeholder="Objectif"><button class="primary" onclick="addPos()">Ajouter</button></div>`+positions.map((p,i)=>{const cur=stocks.find(s=>s.ticker===p.asset)?.price||p.buy;const perf=((cur-p.buy)/p.buy*100);return `<div class="card"><div class="row"><div><b>${p.asset}</b><div class="small">${p.type} · ${p.lev}</div></div><div class="price ${perf>=0?'pos':'neg'}">${perf>=0?'+':''}${perf.toFixed(2)}%</div></div><div class="metrics"><div class="metric"><small>Achat</small><b>$${p.buy}</b></div><div class="metric"><small>Actuel</small><b>$${cur.toFixed(2)}</b></div><div class="metric"><small>P/L</small><b>${((cur-p.buy)*p.qty).toFixed(0)}$</b></div></div><button class="primary" onclick="delPos(${i})">Supprimer</button></div>`}).join('')}
function renderAlerts(){let arr=[];stocks.forEach(s=>{if(s.rsi>=70)arr.push(`${s.ticker}: RSI suracheté, zone de prise de profit possible.`); if(s.rsi<=35)arr.push(`${s.ticker}: RSI survendu, possible zone d'entrée si confirmation.`)});positions.forEach(p=>{const cur=stocks.find(s=>s.ticker===p.asset)?.price||p.buy;if(cur>=p.target)arr.push(`${p.asset}: objectif atteint.`); if(cur<=p.stop)arr.push(`${p.asset}: stop touché.`)});document.getElementById('alerts').innerHTML=arr.length?arr.map(a=>`<div class="card"><b>⚠️ Alerte</b><p>${a}</p></div>`).join(''):'<div class="card">Aucune alerte importante pour le moment.</div>'}
function addPos(){const p={asset:a.value.toUpperCase(),type:ty.value,lev:lev.value||'x1',buy:Number(buy.value),qty:Number(qty.value),stop:Number(stop.value),target:Number(target.value)};positions.push(p);localStorage.setItem('positions',JSON.stringify(positions));renderPortfolio();renderAlerts()}
function delPos(i){positions.splice(i,1);localStorage.setItem('positions',JSON.stringify(positions));renderPortfolio();renderAlerts()}
function show(id,btn){['scanner','portfolio','alerts'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
loadMarket();renderPortfolio();renderAlerts();
</script>
</body>
</html>
